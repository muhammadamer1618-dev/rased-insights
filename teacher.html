```html id="u9k4zm"
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Teacher Panel</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">

<div class="logo-box">
Rased<br>
Insights
</div>

<div class="user-box">

<div class="user-title">
المعلم الحالي
</div>

<div
class="user-name"
id="teacherName"
>
Teacher
</div>

</div>

<div class="menu">

<button onclick="showSection('gradesSection')">
إدخال الدرجات
</button>

<button
class="logout-btn"
onclick="logout()"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div
class="section active-section"
id="gradesSection"
>

<div class="section-header">

<div class="section-title">
درجات الطلاب
</div>

</div>

<div
style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:25px;
"
>

<div class="input-group">

<select id="classSelect">
<option>
اختر الفصل
</option>
</select>

</div>

<div class="input-group">

<input
type="text"
value="لغة إنجليزية"
readonly
/>

</div>

</div>

<div
style="
overflow:auto;
"
>

<table id="gradesTable">

<thead id="tableHead"></thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div
style="
margin-top:20px;
display:flex;
justify-content:center;
"
>

<button
class="primary-btn"
onclick="saveAllGrades()"
>
حفظ جميع الدرجات
</button>

</div>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
query,
where,
addDoc,
updateDoc,
doc

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if(
localStorage.getItem("rasedRole")
!== "teacher"
){

window.location.href =
"index.html";

}

const teacherName =
localStorage.getItem(
"teacherName"
);

document
.getElementById("teacherName")
.innerText =
teacherName;

const classSelect =
document.getElementById(
"classSelect"
);

const tableHead =
document.getElementById(
"tableHead"
);

const tableBody =
document.getElementById(
"tableBody"
);

let exams = [];

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove(
"active-section"
);

});

document
.getElementById(id)
.classList.add(
"active-section"
);

};

async function loadTeacherClasses(){

const snapshot =
await getDocs(
query(
collection(db,"assignments"),
where(
"teacherName",
"==",
teacherName
)
)
);

classSelect.innerHTML =
`
<option>
اختر الفصل
</option>
`;

snapshot.forEach(item=>{

classSelect.innerHTML += `
<option>
${item.data().className}
</option>
`;

});

}

async function loadExams(){

const snapshot =
await getDocs(
collection(db,"exams")
);

exams = [];

snapshot.forEach(item=>{

exams.push(item.data());

});

}

classSelect.addEventListener(
"change",
loadStudentsTable
);

async function loadStudentsTable(){

tableHead.innerHTML = "";
tableBody.innerHTML = "";

const className =
classSelect.value;

if(
className === "اختر الفصل"
){

return;

}

let headHtml = `
<tr>
<th>الطالب</th>
`;

exams.forEach(exam=>{

headHtml += `
<th>
${exam.examName}
<br>
من ${exam.maxDegree}
</th>
`;

});

headHtml += `
</tr>
`;

tableHead.innerHTML =
headHtml;

const studentsSnapshot =
await getDocs(
query(
collection(db,"students"),
where(
"className",
"==",
className
)
)
);

for(
const studentDoc
of studentsSnapshot.docs
){

const student =
studentDoc.data();

let row = `
<tr>
<td>
${student.name}
</td>
`;

for(
const exam
of exams
){

let currentGrade = "";

const gradesSnapshot =
await getDocs(
query(
collection(db,"grades"),
where(
"studentName",
"==",
student.name
),
where(
"className",
"==",
className
),
where(
"examName",
"==",
exam.examName
)
)
);

gradesSnapshot.forEach(g=>{

currentGrade =
g.data().grade;

});

row += `

<td>

<input
type="number"
value="${currentGrade}"
max="${exam.maxDegree}"
data-student="${student.name}"
data-exam="${exam.examName}"
data-max="${exam.maxDegree}"
class="grade-input"
style="
width:80px;
padding:10px;
border:none;
border-radius:10px;
background:#020617;
color:white;
text-align:center;
"
/>

</td>

`;

}

row += `
</tr>
`;

tableBody.innerHTML +=
row;

}

}

window.saveAllGrades =
async function(){

const className =
classSelect.value;

const inputs =
document.querySelectorAll(
".grade-input"
);

for(
const input
of inputs
){

const studentName =
input.dataset.student;

const examName =
input.dataset.exam;

const maxDegree =
Number(
input.dataset.max
);

const grade =
Number(
input.value
);

if(
!input.value
){

continue;

}

if(
grade > maxDegree
){

alert(
`${studentName} تجاوز الدرجة النهائية`
);

return;

}

const existing =
await getDocs(
query(
collection(db,"grades"),
where(
"studentName",
"==",
studentName
),
where(
"className",
"==",
className
),
where(
"examName",
"==",
examName
)
)
);

if(existing.empty){

await addDoc(
collection(db,"grades"),
{

teacherName,

studentName,

className,

subject:
"لغة إنجليزية",

examName,

grade

}
);

}

else{

await updateDoc(
doc(
db,
"grades",
existing.docs[0].id
),
{
grade
}
);

}

}

alert(
"تم حفظ جميع الدرجات"
);

};

window.logout =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

await loadExams();

await loadTeacherClasses();

</script>

</body>

</html>
```
