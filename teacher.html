<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

.container{
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

select,button,input{
padding:12px;
border-radius:12px;
border:none;
outline:none;
font-family:'Cairo';
}

select{
background:#1e293b;
color:white;
margin-left:10px;
}

button{
cursor:pointer;
background:#2563eb;
color:white;
font-weight:700;
}

.logout{
background:#dc2626;
}

.section{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

input.grade{
width:80px;
text-align:center;
background:#0f172a;
color:white;
}

.save-btn{
margin-top:15px;
width:100%;
background:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h2>لوحة المعلم</h2>

<button class="logout" onclick="logout()">تسجيل خروج</button>

</div>

<!-- SELECT CLASS -->
<div class="section">

<h3>الفصول المسندة</h3>

<select id="classSelect" onchange="loadStudents()"></select>

<select id="examSelect">
<option>الاختبار الأول</option>
<option>الاختبار الثاني</option>
<option>الاختبار الثالث</option>
<option>نصف الفصل</option>
<option>نهاية الفصل</option>
</select>

</div>

<!-- STUDENTS -->
<div class="section">

<h3>الطلاب</h3>

<table>

<thead>
<tr>
<th>الطالب</th>
<th>الدرجة</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

<button class="save-btn" onclick="saveGrades()">
حفظ الدرجات
</button>

</div>

</div>

<script>

/* AUTH */
const user = JSON.parse(localStorage.getItem("currentUser"));

if(!user || user.role !== "teacher"){
window.location.href="index.html";
}

/* GET TEACHER */
const teachers = JSON.parse(localStorage.getItem("teachers")) || [];
const teacher = teachers.find(t=>t.username === user.username);

/* LOAD CLASSES */
const classSelect = document.getElementById("classSelect");

function loadClasses(){

if(!teacher || !teacher.classes){
classSelect.innerHTML = "<option>لا يوجد فصول مسندة</option>";
return;
}

classSelect.innerHTML = "";

teacher.classes.forEach(c=>{
classSelect.innerHTML += `<option>${c}</option>`;
});

loadStudents();

}

/* LOAD STUDENTS */
function loadStudents(){

const className = classSelect.value;

const students = JSON.parse(localStorage.getItem("students")) || [];

const filtered = students.filter(s=>s.className === className);

const tbody = document.getElementById("studentsTable");

tbody.innerHTML = "";

filtered.forEach(s=>{

tbody.innerHTML += `
<tr>
<td>${s.name}</td>
<td>
<input class="grade" type="number" min="0" max="100" data-student="${s.name}">
</td>
</tr>
`;

});

}

/* SAVE GRADES */
function saveGrades(){

const className = classSelect.value;
const exam = document.getElementById("examSelect").value;

let grades = JSON.parse(localStorage.getItem("grades")) || [];

document.querySelectorAll(".grade").forEach(input=>{

grades.push({
student: input.dataset.student,
className,
exam,
grade: Number(input.value || 0)
});

});

localStorage.setItem("grades", JSON.stringify(grades));

alert("تم حفظ الدرجات");

}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
window.location.href="index.html";
}

/* INIT */
loadClasses();

</script>

</body>
</html>
