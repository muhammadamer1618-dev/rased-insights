<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Panel</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">
  <div class="logo-box">Rased<br>Insights</div>

  <div class="user-box">
    <div class="user-title">المعلم الحالي</div>
    <div class="user-name" id="teacherName">Teacher</div>
  </div>

  <div class="menu">
    <button onclick="showSection('gradesSection')">إدخال الدرجات</button>
    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div class="main">

<div class="section active-section" id="gradesSection">

  <div class="section-header">
    <div class="section-title">إدخال درجات الطلاب</div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:25px;">
    <div class="input-group">
      <select id="classSelect">
        <option>اختر الفصل</option>
      </select>
    </div>

    <div class="input-group">
      <input type="text" value="لغة إنجليزية" readonly/>
    </div>

    <div class="input-group">
      <select id="clearExamSelect">
        <option>اختر اختبار للتفريغ</option>
      </select>
    </div>
  </div>

  <div style="overflow:auto;">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div style="margin-top:20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
    <button class="primary-btn" onclick="saveAllGrades()">حفظ جميع الدرجات</button>

    <button class="primary-btn" style="background:#dc2626;color:white;" onclick="clearSelectedExam()">
      تفريغ الاختبار المحدد
    </button>

    <button class="primary-btn" style="background:#7f1d1d;color:white;" onclick="clearAllExams()">
      تفريغ جميع الاختبارات
    </button>
  </div>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  query,
  where,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if (localStorage.getItem("rasedRole") !== "teacher") {
  window.location.href = "index.html";
}

const teacherName = localStorage.getItem("teacherName");

document.getElementById("teacherName").innerText =
  teacherName || "Teacher";

const classSelect = document.getElementById("classSelect");
const clearExamSelect = document.getElementById("clearExamSelect");
const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");

let exams = [];
let allGrades = [];

window.showSection = function(id) {
  document.querySelectorAll(".section").forEach(section => {
    section.classList.remove("active-section");
  });

  document.getElementById(id).classList.add("active-section");
};

async function loadTeacherClasses() {
  classSelect.innerHTML = "<option>اختر الفصل</option>";

  const snapshot = await getDocs(
    query(
      collection(db, "assignments"),
      where("teacherName", "==", teacherName)
    )
  );

  const classes = [];

  snapshot.forEach(item => {
    classes.push(item.data().className);
  });

  classes.sort((a, b) => a.localeCompare(b, "ar"));

  classes.forEach(className => {
    classSelect.innerHTML += `<option>${className}</option>`;
  });
}

async function loadExams() {
  exams = [];

  const snapshot = await getDocs(collection(db, "exams"));

  snapshot.forEach(item => {
    const data = item.data();

    exams.push({
      examName: data.examName,
      maxDegree: Number(data.maxDegree || 0),
      order: Number(data.order || 999)
    });
  });

  exams.sort((a, b) => a.order - b.order);

  clearExamSelect.innerHTML = "<option>اختر اختبار للتفريغ</option>";

  exams.forEach(exam => {
    clearExamSelect.innerHTML += `
      <option value="${exam.examName}">
        ${exam.examName}
      </option>
    `;
  });
}

async function loadAllGrades() {
  allGrades = [];

  const snapshot = await getDocs(
    query(
      collection(db, "grades"),
      where("teacherName", "==", teacherName)
    )
  );

  snapshot.forEach(item => {
    allGrades.push({
      id: item.id,
      ...item.data()
    });
  });
}

classSelect.addEventListener("change", loadStudentsTable);

async function loadStudentsTable() {
  tableHead.innerHTML = "";
  tableBody.innerHTML = "";

  const className = classSelect.value;

  if (className === "اختر الفصل") {
    return;
  }

  tableBody.innerHTML = `
    <tr class="loading-row">
      <td colspan="50">جاري تحميل الطلاب...</td>
    </tr>
  `;

  await loadAllGrades();

  if (exams.length === 0) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="50">لا توجد اختبارات مضافة من الأدمن</td>
      </tr>
    `;
    return;
  }

  let head = `
    <tr>
      <th>اسم الطالب</th>
  `;

  exams.forEach(exam => {
    head += `
      <th>
        ${exam.examName}
        <br>
        من ${exam.maxDegree}
      </th>
    `;
  });

  head += `</tr>`;
  tableHead.innerHTML = head;

  const studentsSnapshot = await getDocs(
    query(
      collection(db, "students"),
      where("className", "==", className)
    )
  );

  const students = [];

  studentsSnapshot.forEach(studentDoc => {
    students.push(studentDoc.data());
  });

  students.sort((a, b) =>
    a.name.localeCompare(b.name, "ar")
  );

  let html = "";

  for (const student of students) {
    html += `
      <tr>
        <td class="student-name">
          ${student.name}
        </td>
    `;

    for (const exam of exams) {
      const existingGrade = allGrades.find(item =>
        item.studentName === student.name &&
        item.className === className &&
        item.examName === exam.examName
      );

      const currentGrade = existingGrade ? existingGrade.grade : "";

      html += `
        <td>
          <input
            type="number"
            value="${currentGrade}"
            min="0"
            max="${exam.maxDegree}"
            data-student="${student.name}"
            data-exam="${exam.examName}"
            data-max="${exam.maxDegree}"
            class="grade-input"
            style="
              width:85px;
              padding:8px;
              border:none;
              border-radius:10px;
              background:#020617;
              color:white;
              text-align:center;
            "
          />
        </td>
      `;
    }

    html += `</tr>`;
  }

  tableBody.innerHTML = html;
}

window.saveAllGrades = async function() {
  const className = classSelect.value;

  if (className === "اختر الفصل") {
    alert("اختر الفصل أولًا");
    return;
  }

  const inputs = document.querySelectorAll(".grade-input");

  for (const input of inputs) {
    const studentName = input.dataset.student;
    const examName = input.dataset.exam;
    const maxDegree = Number(input.dataset.max);
    const value = input.value.trim();

    if (value === "") {
      continue;
    }

    const grade = Number(value);

    if (grade > maxDegree) {
      alert(`${studentName} درجته أكبر من الدرجة النهائية في ${examName}`);
      return;
    }

    const existing = allGrades.find(item =>
      item.studentName === studentName &&
      item.className === className &&
      item.examName === examName
    );

    if (existing) {
      await updateDoc(
        doc(db, "grades", existing.id),
        {
          grade,
          maxDegree
        }
      );
    } else {
      await addDoc(
        collection(db, "grades"),
        {
          teacherName,
          studentName,
          className,
          subject: "لغة إنجليزية",
          examName,
          grade,
          maxDegree
        }
      );
    }
  }

  alert("تم حفظ جميع الدرجات");
  await loadStudentsTable();
};

window.clearSelectedExam = async function() {
  const className = classSelect.value;
  const examName = clearExamSelect.value;

  if (className === "اختر الفصل") {
    alert("اختر الفصل أولًا");
    return;
  }

  if (examName === "اختر اختبار للتفريغ") {
    alert("اختر الاختبار المطلوب تفريغه");
    return;
  }

  const confirmClear = confirm(
    `هل تريد تفريغ درجات "${examName}" لهذا الفصل؟`
  );

  if (!confirmClear) {
    return;
  }

  const snapshot = await getDocs(
    query(
      collection(db, "grades"),
      where("teacherName", "==", teacherName),
      where("className", "==", className),
      where("examName", "==", examName)
    )
  );

  for (const item of snapshot.docs) {
    await deleteDoc(
      doc(db, "grades", item.id)
    );
  }

  alert("تم تفريغ درجات الاختبار المحدد");
  await loadStudentsTable();
};

window.clearAllExams = async function() {
  const className = classSelect.value;

  if (className === "اختر الفصل") {
    alert("اختر الفصل أولًا");
    return;
  }

  const confirmClear = confirm(
    "هل تريد تفريغ جميع درجات هذا الفصل؟"
  );

  if (!confirmClear) {
    return;
  }

  const snapshot = await getDocs(
    query(
      collection(db, "grades"),
      where("teacherName", "==", teacherName),
      where("className", "==", className)
    )
  );

  for (const item of snapshot.docs) {
    await deleteDoc(
      doc(db, "grades", item.id)
    );
  }

  alert("تم تفريغ جميع درجات الفصل");
  await loadStudentsTable();
};

window.logout = function() {
  localStorage.clear();
  window.location.href = "index.html";
};

await loadExams();
await loadTeacherClasses();

</script>

</body>
</html>
