<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Supervisor Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
    }

    .container {
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .topbar h1 {
      font-size: 30px;
      font-weight: 800;
    }

    .logout-btn {
      border: none;
      background: #dc2626;
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 25px;
    }

    .card h3 {
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .number {
      font-size: 36px;
      font-weight: 800;
      color: #facc15;
    }

    .section {
      background: #1e293b;
      border-radius: 24px;
      padding: 25px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      background: rgba(255,255,255,0.06);
      padding: 15px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .excellent {
      color: #22c55e;
      font-weight: 700;
    }

    .weak {
      color: #ef4444;
      font-weight: 700;
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="topbar">

      <h1>
        لوحة المشرف
      </h1>

      <button
        class="logout-btn"
        id="logoutBtn"
      >
        تسجيل الخروج
      </button>

    </div>

    <div class="cards">

      <div class="card">

        <h3>
          عدد الطلاب
        </h3>

        <div class="number">
          250
        </div>

      </div>

      <div class="card">

        <h3>
          نسبة النجاح
        </h3>

        <div class="number">
          92%
        </div>

      </div>

      <div class="card">

        <h3>
          الطلاب المتفوقين
        </h3>

        <div class="number">
          48
        </div>

      </div>

    </div>

    <div class="section">

      <h2>
        متابعة الأداء
      </h2>

      <table>

        <thead>

          <tr>

            <th>
              الطالب
            </th>

            <th>
              المتوسط
            </th>

            <th>
              الحالة
            </th>

          </tr>

        </thead>

        <tbody>

          <tr>

            <td>
              محمد أحمد
            </td>

            <td>
              95
            </td>

            <td class="excellent">
              ممتاز ↑
            </td>

          </tr>

          <tr>

            <td>
              علي خالد
            </td>

            <td>
              54
            </td>

            <td class="weak">
              ضعيف ↓
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

  <script type="module">

    import {
      initializeApp
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      signOut
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {

      apiKey: "AIzaSyAalS33kADTW9D2RkXXZ27n9TFvd9TAVJM",

      authDomain: "englis-results.firebaseapp.com",

      projectId: "englis-results",

      storageBucket: "englis-results.firebasestorage.app",

      messagingSenderId: "467628171773",

      appId: "1:467628171773:web:26d848542fdb89aea17994"

    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    document
      .getElementById("logoutBtn")
      .addEventListener("click", async () => {

        await signOut(auth);

        window.location.href = "index.html";

      });

  </script>

</body>

</html>
