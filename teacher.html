<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Teacher Panel</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">

<div class="logo-box">
Rased<br>
Insights
</div>

<div class="user-box">

<div class="user-title">
المعلم الحالي
</div>

<div
class="user-name"
id="teacherName"
>
Teacher
</div>

</div>

<div class="menu">

<button onclick="showSection('gradesSection')">
إدخال الدرجات
</button>

<button
class="logout-btn"
onclick="logout()"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div
class="section active-section"
id="gradesSection"
>

<div class="section-header">

<div class="section-title">
إدخال درجات الطلاب
</div>

</div>

<div
style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:25px;
"
>

<div class="input-group">

<select id="classSelect">
<option>
اختر الفصل
</option>
</select>

</div>

<div class="input-group">

<input
type="text"
value="لغة إنجليزية"
readonly
/>

</div>

<div class="input-group">

<select id="examSelect">

<option>
اختر الاختبار
</option>

<option>
الاختبار الدوري الأول
</option>

<option>
الاختبار الدوري الثاني
</option>

<option>
الاختبار الدوري الثالث
</option>

<option>
الاختبار الدوري الرابع
</option>

<option>
الاختبار الدوري الخامس
</option>

<option>
الاختبار الدوري السادس
</option>

<option>
الاختبار الدوري السابع
</option>

<option>
الاختبار الدوري الثامن
</option>

<option>
اختبار الفترة الأولى
</option>

<option>
اختبار الفترة الثانية
</option>

</select>

</div>

</div>

<table>

<thead>

<tr>

<th>
اسم الطالب
</th>

<th>
الفصل
</th>

<th>
المادة
</th>

<th>
الاختبار
</th>

<th>
الدرجة
</th>

</tr>

</thead>

<tbody id="studentsTable"></tbody>

</table>

<div
style="
margin-top:25px;
display:flex;
justify-content:flex-end;
"
>

<button
class="primary-btn"
onclick="saveGrades()"
>
حفظ الدرجات
</button>

</div>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
query,
where,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if(
localStorage.getItem("rasedRole")
!== "teacher"
){

window.location.href =
"index.html";

}

const teacherName =
localStorage.getItem(
"teacherName"
);

document
.getElementById("teacherName")
.innerText =
teacherName;

const classSelect =
document.getElementById(
"classSelect"
);

const studentsTable =
document.getElementById(
"studentsTable"
);

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove(
"active-section"
);

});

document
.getElementById(id)
.classList.add(
"active-section"
);

};

async function loadTeacherClasses(){

const snapshot =
await getDocs(
query(
collection(db,"assignments"),
where(
"teacherName",
"==",
teacherName
)
)
);

classSelect.innerHTML =
`
<option>
اختر الفصل
</option>
`;

snapshot.forEach(item=>{

const data =
item.data();

classSelect.innerHTML += `

<option>
${data.className}
</option>

`;

});

}

classSelect.addEventListener(
"change",
loadStudents
);

async function loadStudents(){

const className =
classSelect.value;

studentsTable.innerHTML = "";

if(
className ===
"اختر الفصل"
){

return;

}

const snapshot =
await getDocs(
query(
collection(db,"students"),
where(
"className",
"==",
className
)
)
);

snapshot.forEach(item=>{

const data =
item.data();

studentsTable.innerHTML += `

<tr>

<td>
${data.name}
</td>

<td>
${data.className}
</td>

<td>
لغة إنجليزية
</td>

<td>
${document.getElementById("examSelect").value}
</td>

<td>

<input
type="number"
min="0"
max="100"
placeholder="الدرجة"
class="grade-input"
data-student="${data.name}"
style="
width:100px;
padding:10px;
border:none;
border-radius:10px;
background:#020617;
color:white;
text-align:center;
"
/>

</td>

</tr>

`;

});

}

window.saveGrades =
async function(){

const examName =
document
.getElementById("examSelect")
.value;

const className =
classSelect.value;

if(
examName ===
"اختر الاختبار"
){

alert(
"اختر الاختبار"
);

return;

}

const inputs =
document.querySelectorAll(
".grade-input"
);

for(
const input
of inputs
){

await addDoc(
collection(db,"grades"),
{

teacherName:
teacherName,

studentName:
input.dataset.student,

className:
className,

subject:
"لغة إنجليزية",

examName:
examName,

grade:
input.value

}
);

}

alert(
"تم حفظ الدرجات"
);

};

window.logout =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

loadTeacherClasses();

</script>

</body>

</html>
