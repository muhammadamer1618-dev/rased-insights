<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if(localStorage.getItem("rasedRole") !== "supervisor"){
window.location.href = "index.html";
}

const teacherSelect = document.getElementById("teacherSelect");
const classSelect = document.getElementById("classSelect");
const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");
const reportSubtitle = document.getElementById("reportSubtitle");

let exams = [];
let allGrades = [];

async function loadTeachers(){

teacherSelect.innerHTML = "<option>اختر المعلم</option>";

const snapshot = await getDocs(collection(db,"teachers"));

const teachers = [];

snapshot.forEach(item=>{
teachers.push(item.data().name);
});

teachers.sort((a,b)=>a.localeCompare(b,"ar"));

teachers.forEach(name=>{
teacherSelect.innerHTML += `<option>${name}</option>`;
});

}

async function loadExams(){

exams = [];

const snapshot = await getDocs(collection(db,"exams"));

snapshot.forEach(item=>{

const data = item.data();

exams.push({
examName:data.examName,
maxDegree:Number(data.maxDegree || 0),
order:Number(data.order || 999)
});

});

exams.sort((a,b)=>a.order - b.order);

}

async function loadAllGrades(){

allGrades = [];

const snapshot = await getDocs(collection(db,"grades"));

snapshot.forEach(item=>{
allGrades.push({
id:item.id,
...item.data()
});
});

}

teacherSelect.addEventListener("change",loadTeacherClasses);
classSelect.addEventListener("change",loadReport);

async function loadTeacherClasses(){

classSelect.innerHTML = "<option>اختر الفصل</option>";

tableHead.innerHTML = "";
tableBody.innerHTML = "";

resetStats();

const teacherName = teacherSelect.value;

if(teacherName === "اختر المعلم"){
return;
}

const snapshot = await getDocs(
query(
collection(db,"assignments"),
where("teacherName","==",teacherName)
)
);

const classes = [];

snapshot.forEach(item=>{
classes.push(item.data().className);
});

classes.sort((a,b)=>a.localeCompare(b,"ar"));

classes.forEach(className=>{
classSelect.innerHTML += `<option>${className}</option>`;
});

}

function resetStats(){

document.getElementById("studentsCount").innerText = "0";
document.getElementById("classAverage").innerText = "0%";
document.getElementById("improvedCount").innerText = "0";
document.getElementById("declinedCount").innerText = "0";

reportSubtitle.innerText =
"اختر المعلم والفصل لعرض التقرير";

}

function getChangeLabel(currentPercent,previousPercent){

if(previousPercent === null){
return {
text:"-",
color:"#94a3b8",
key:"none"
};
}

if(currentPercent > previousPercent){
return {
text:"↑",
color:"#22c55e",
key:"up"
};
}

if(currentPercent < previousPercent){
return {
text:"↓",
color:"#ef4444",
key:"down"
};
}

return {
text:"→",
color:"#facc15",
key:"stable"
};

}

function getOverallStatus(changes){

const up = changes.filter(item=>item==="up").length;
const down = changes.filter(item=>item==="down").length;

if(up > down){
return {
text:"تحسن",
color:"#22c55e",
key:"up"
};
}

if(down > up){
return {
text:"نزول",
color:"#ef4444",
key:"down"
};
}

return {
text:"ثابت",
color:"#facc15",
key:"stable"
};

}

async function loadReport(){

tableHead.innerHTML = "";

tableBody.innerHTML = `
<tr>
<td colspan="50">
جاري تحميل التقرير...
</td>
</tr>
`;

resetStats();

const teacherName = teacherSelect.value;
const className = classSelect.value;

if(
teacherName === "اختر المعلم" ||
className === "اختر الفصل"
){
tableBody.innerHTML = "";
return;
}

reportSubtitle.innerText =
`المعلم: ${teacherName} | الفصل: ${className}`;

await loadAllGrades();

if(exams.length === 0){

tableBody.innerHTML = `
<tr>
<td colspan="50">
لا توجد اختبارات مضافة
</td>
</tr>
`;

return;

}

let head = `
<tr>
<th>اسم الطالب</th>
`;

exams.forEach(exam=>{

head += `
<th>
${exam.examName}
<br>
من ${exam.maxDegree}
</th>
`;

});

head += `
<th>المتوسط</th>
<th>المستوى العام</th>
</tr>
`;

tableHead.innerHTML = head;

const studentsSnapshot = await getDocs(
query(
collection(db,"students"),
where("className","==",className)
)
);

const students = [];

studentsSnapshot.forEach(studentDoc=>{
students.push(studentDoc.data());
});

students.sort((a,b)=>
a.name.localeCompare(b.name,"ar")
);

let studentsCount = 0;
let classTotalPercent = 0;
let improvedCount = 0;
let declinedCount = 0;

let html = "";

for(const student of students){

studentsCount++;

let row = `
<tr>
<td class="student-name">
${student.name}
</td>
`;

let previousPercent = null;
let changes = [];
let studentTotalPercent = 0;
let studentGradeCount = 0;

for(const exam of exams){

const gradeData = allGrades.find(item=>

item.studentName === student.name

&&

item.className === className

&&

item.examName === exam.examName

&&

item.teacherName === teacherName

);

if(gradeData){

const percent = exam.maxDegree
?
Math.round(
(
Number(gradeData.grade)
/
Number(exam.maxDegree)
)
* 100
)
:0;

const change =
getChangeLabel(
percent,
previousPercent
);

if(change.key !== "none"){
changes.push(change.key);
}

previousPercent = percent;

studentTotalPercent += percent;
studentGradeCount++;

let gradeColor = "#facc15";

if(percent >= 85){
gradeColor = "#22c55e";
}
else if(percent < 60){
gradeColor = "#ef4444";
}

row += `
<td>

<div style="font-weight:800;">
${gradeData.grade} / ${exam.maxDegree}
</div>

<div style="font-weight:700;">
${percent}%
</div>

<div style="font-weight:900;">
${change.text}
</div>

</td>
`;

}else{

row += `<td>-</td>`;

}

}

const average = studentGradeCount
?
Math.round(studentTotalPercent / studentGradeCount)
:0;

classTotalPercent += average;

const overall = getOverallStatus(changes);

if(overall.key === "up"){
improvedCount++;
}

if(overall.key === "down"){
declinedCount++;
}

row += `
<td style="font-weight:900;">
${average}%
</td>

<td style="font-weight:900;">
${overall.text}
</td>

</tr>
`;

html += row;

}

tableBody.innerHTML = html;

document.getElementById("studentsCount").innerText =
studentsCount;

document.getElementById("classAverage").innerText =
studentsCount
?
Math.round(classTotalPercent / studentsCount) + "%"
:
"0%";

document.getElementById("improvedCount").innerText =
improvedCount;

document.getElementById("declinedCount").innerText =
declinedCount;

}

window.logout = function(){

localStorage.clear();

window.location.href = "index.html";

};

await loadExams();
await loadTeachers();

</script>

</body>
</html>
