<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove(
"active-section"
);

});

document
.getElementById(id)
.classList.add(
"active-section"
);

};

const teacherSelect =
document.getElementById(
"teacherSelect"
);

const classSelect =
document.getElementById(
"classSelect"
);

const studentSelect =
document.getElementById(
"studentSelect"
);

const studentTable =
document.getElementById(
"studentTable"
);

let chart = null;

async function loadTeachers(){

const snapshot =
await getDocs(
collection(db,"teachers")
);

snapshot.forEach(item=>{

teacherSelect.innerHTML += `
<option>
${item.data().name}
</option>
`;

});

}

teacherSelect.addEventListener(
"change",
loadClasses
);

async function loadClasses(){

classSelect.innerHTML = `
<option>
اختر الفصل
</option>
`;

const snapshot =
await getDocs(
query(
collection(db,"assignments"),
where(
"teacherName",
"==",
teacherSelect.value
)
)
);

snapshot.forEach(item=>{

classSelect.innerHTML += `
<option>
${item.data().className}
</option>
`;

});

}

classSelect.addEventListener(
"change",
loadStudents
);

async function loadStudents(){

studentSelect.innerHTML = `
<option>
اختر الطالب
</option>
`;

const snapshot =
await getDocs(
query(
collection(db,"students"),
where(
"className",
"==",
classSelect.value
)
)
);

snapshot.forEach(item=>{

studentSelect.innerHTML += `
<option>
${item.data().name}
</option>
`;

});

}

studentSelect.addEventListener(
"change",
loadStudentAnalytics
);

async function loadStudentAnalytics(){

studentTable.innerHTML = "";

const snapshot =
await getDocs(
query(
collection(db,"grades"),
where(
"studentName",
"==",
studentSelect.value
)
)
);

let labels = [];
let grades = [];

let total = 0;

let highest = 0;

snapshot.forEach(item=>{

const data =
item.data();

const grade =
Number(data.grade);

labels.push(
data.examName
);

grades.push(
grade
);

total += grade;

if(
grade > highest
){

highest = grade;

}

let status = "";

let statusColor = "";

if(grade >= 85){

status = "ممتاز";
statusColor = "#22c55e";

}

else if(grade >= 60){

status = "متوسط";
statusColor = "#facc15";

}

else{

status = "ضعيف";
statusColor = "#ef4444";

}

studentTable.innerHTML += `

<tr>

<td>
${data.examName}
</td>

<td>
${grade}
</td>

<td
style="
color:${statusColor};
font-weight:bold;
"
>
${status}
</td>

</tr>

`;

});

const average =
grades.length
?

Math.round(
total / grades.length
)

:

0;

document
.getElementById("studentAverage")
.innerText =
average + "%";

document
.getElementById("highestGrade")
.innerText =
highest;

let finalStatus = "";

if(average >= 85){

finalStatus = "ممتاز";

}

else if(average >= 60){

finalStatus = "متوسط";

}

else{

finalStatus = "ضعيف";

}

document
.getElementById("studentStatus")
.innerText =
finalStatus;

if(chart){

chart.destroy();

}

chart =
new Chart(

document.getElementById(
"studentChart"
),

{

type:"line",

data:{

labels,

datasets:[{

label:"تطور الطالب",

data:grades,

borderWidth:3,

tension:0.3

}]

}

}

);

}

async function loadTopStudents(){

const snapshot =
await getDocs(
collection(db,"grades")
);

let students = {};

snapshot.forEach(item=>{

const data =
item.data();

if(
!students[data.studentName]
){

students[data.studentName] = [];

}

students[data.studentName]
.push(
Number(data.grade)
);

});

let results = [];

for(
const student
in students
){

const arr =
students[student];

const avg =
arr.reduce(
(a,b)=>a+b,
0
)
/
arr.length;

results.push({

name:student,
average:
Math.round(avg)

});

}

results.sort(
(a,b)=>
b.average - a.average
);

const table =
document.getElementById(
"topStudentsTable"
);

table.innerHTML = "";

results.forEach(
(item,index)=>{

table.innerHTML += `

<tr>

<td>
${index + 1}
</td>

<td>
${item.name}
</td>

<td>
${item.average}%
</td>

</tr>

`;

});

loadRiskStudents(results);

}

function loadRiskStudents(results){

const table =
document.getElementById(
"riskTable"
);

table.innerHTML = "";

results.forEach(item=>{

if(item.average < 60){

table.innerHTML += `

<tr>

<td>
${item.name}
</td>

<td>
${item.average}%
</td>

<td
style="
color:#ef4444;
font-weight:bold;
"
>
ضعيف
</td>

</tr>

`;

}

});

}

loadTeachers();

loadTopStudents();

</script>
