<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports</title>
<link rel="stylesheet" href="style.css"/>

<style>
@media print {
  .sidebar,
  .filters-area,
  .print-btn {
    display: none !important;
  }

  .dashboard-layout {
    display: block;
  }

  .main {
    padding: 0;
  }

  body {
    background: white;
    color: black;
  }

  .section {
    display: block !important;
    background: white;
    color: black;
  }

  table {
    color: black;
  }
}
</style>
</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">
  <div class="logo-box">Rased<br>Insights</div>

  <div class="user-box">
    <div class="user-title">التقارير</div>
    <div class="user-name">قسم اللغة الإنجليزية</div>
  </div>

  <div class="menu">
    <button class="print-btn" onclick="window.print()">طباعة التقرير</button>
    <button onclick="window.location.href='supervisor.html'">رجوع للمشرف</button>
    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div class="main">

<div class="section active-section">

  <div class="section-header">
    <div class="section-title">تقرير مقارنة اختبارات الطلاب</div>
  </div>

  <div class="filters-area" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:25px;">
    <div class="input-group">
      <select id="teacherSelect">
        <option>اختر المعلم</option>
      </select>
    </div>

    <div class="input-group">
      <select id="classSelect">
        <option>اختر الفصل</option>
      </select>
    </div>
  </div>

  <div class="stats-grid" style="margin-bottom:25px;">
    <div class="stat-card">
      <div class="stat-title">عدد الطلاب</div>
      <div class="stat-number" id="studentsCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">متوسط الفصل</div>
      <div class="stat-number" id="classAverage">0%</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">طلاب في تحسن</div>
      <div class="stat-number" id="improvedCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">طلاب في نزول</div>
      <div class="stat-number" id="declinedCount">0</div>
    </div>
  </div>

  <div style="overflow:auto;">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if (localStorage.getItem("rasedRole") !== "supervisor") {
  window.location.href = "index.html";
}

const teacherSelect = document.getElementById("teacherSelect");
const classSelect = document.getElementById("classSelect");
const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");

let exams = [];

async function loadTeachers() {
  teacherSelect.innerHTML = "<option>اختر المعلم</option>";

  const snapshot = await getDocs(collection(db, "teachers"));

  snapshot.forEach(item => {
    const data = item.data();
    teacherSelect.innerHTML += `<option>${data.name}</option>`;
  });
}

async function loadExams() {
  exams = [];

  const snapshot = await getDocs(collection(db, "exams"));

  snapshot.forEach(item => {
    const data = item.data();

    exams.push({
      examName: data.examName,
      maxDegree: Number(data.maxDegree || 0)
    });
  });
}

teacherSelect.addEventListener("change", loadTeacherClasses);
classSelect.addEventListener("change", loadReport);

async function loadTeacherClasses() {
  classSelect.innerHTML = "<option>اختر الفصل</option>";
  tableHead.innerHTML = "";
  tableBody.innerHTML = "";

  const teacherName = teacherSelect.value;

  if (teacherName === "اختر المعلم") {
    return;
  }

  const snapshot = await getDocs(
    query(
      collection(db, "assignments"),
      where("teacherName", "==", teacherName)
    )
  );

  snapshot.forEach(item => {
    const data = item.data();
    classSelect.innerHTML += `<option>${data.className}</option>`;
  });
}

async function loadReport() {
  tableHead.innerHTML = "";
  tableBody.innerHTML = "";

  const teacherName = teacherSelect.value;
  const className = classSelect.value;

  if (teacherName === "اختر المعلم" || className === "اختر الفصل") {
    return;
  }

  let head = `
    <tr>
      <th>اسم الطالب</th>
  `;

  exams.forEach(exam => {
    head += `
      <th>
        ${exam.examName}
        <br>
        من ${exam.maxDegree}
      </th>
    `;
  });

  head += `
      <th>متوسط الطالب</th>
      <th>الحالة</th>
    </tr>
  `;

  tableHead.innerHTML = head;

  const studentsSnapshot = await getDocs(
    query(
      collection(db, "students"),
      where("className", "==", className)
    )
  );

  let studentsCount = 0;
  let classTotalPercent = 0;
  let improvedCount = 0;
  let declinedCount = 0;

  for (const studentDoc of studentsSnapshot.docs) {
    const student = studentDoc.data();

    studentsCount++;

    let row = `
      <tr>
        <td>${student.name}</td>
    `;

    let percentages = [];
    let studentTotal = 0;
    let studentGradesCount = 0;

    for (const exam of exams) {
      let grade = "";

      const gradesSnapshot = await getDocs(
        query(
          collection(db, "grades"),
          where("studentName", "==", student.name),
          where("className", "==", className),
          where("examName", "==", exam.examName),
          where("teacherName", "==", teacherName)
        )
      );

      gradesSnapshot.forEach(g => {
        grade = g.data().grade;
      });

      if (grade !== "") {
        const percent = exam.maxDegree
          ? Math.round((Number(grade) / Number(exam.maxDegree)) * 100)
          : 0;

        percentages.push(percent);
        studentTotal += percent;
        studentGradesCount++;

        let color = "#facc15";

        if (percent >= 85) {
          color = "#22c55e";
        } else if (percent < 60) {
          color = "#ef4444";
        }

        row += `
          <td style="color:${color};font-weight:800;">
            ${grade} / ${exam.maxDegree}
            <br>
            ${percent}%
          </td>
        `;
      } else {
        row += `<td>-</td>`;
      }
    }

    const average = studentGradesCount
      ? Math.round(studentTotal / studentGradesCount)
      : 0;

    classTotalPercent += average;

    let status = "-";
    let statusColor = "#94a3b8";

    if (percentages.length >= 2) {
      const first = percentages[0];
      const last = percentages[percentages.length - 1];

      if (last > first) {
        status = "تحسن";
        statusColor = "#22c55e";
        improvedCount++;
      } else if (last < first) {
        status = "نزول";
        statusColor = "#ef4444";
        declinedCount++;
      } else {
        status = "ثابت";
        statusColor = "#facc15";
      }
    }

    row += `
        <td style="font-weight:800;">${average}%</td>
        <td style="color:${statusColor};font-weight:900;">${status}</td>
      </tr>
    `;

    tableBody.innerHTML += row;
  }

  document.getElementById("studentsCount").innerText = studentsCount;

  document.getElementById("classAverage").innerText =
    studentsCount ? Math.round(classTotalPercent / studentsCount) + "%" : "0%";

  document.getElementById("improvedCount").innerText = improvedCount;
  document.getElementById("declinedCount").innerText = declinedCount;
}

window.logout = function() {
  localStorage.clear();
  window.location.href = "index.html";
};

await loadExams();
await loadTeachers();

</script>

</body>
</html>
