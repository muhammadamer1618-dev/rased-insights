<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Reports</title>

<link
rel="stylesheet"
href="style.css"
/>

<style>

*{
direction:rtl;
unicode-bidi:embed;
}

.report-title{
text-align:center;
font-size:26px;
font-weight:900;
color:#facc15;
margin-bottom:8px;
}

.report-subtitle{
text-align:center;
color:#cbd5e1;
font-size:15px;
margin-bottom:22px;
}

.report-footer{
display:none;
}

.legend{
display:none;
}

.score-line,
.percent-line{
direction:ltr;
unicode-bidi:embed;
}

@media print{

@page{
size:A4 portrait;
margin:10mm;
}

html,
body{
background:#ffffff !important;
color:#000000 !important;
direction:rtl !important;
unicode-bidi:embed !important;
font-family:Arial,Tahoma,sans-serif !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

*{
direction:rtl !important;
unicode-bidi:embed !important;
font-family:Arial,Tahoma,sans-serif !important;
}

.sidebar,
.filters-area,
.print-actions{
display:none !important;
}

.dashboard-layout{
display:block !important;
background:#ffffff !important;
}

.main{
padding:0 !important;
overflow:visible !important;
background:#ffffff !important;
}

.section{
display:block !important;
background:#ffffff !important;
color:#000000 !important;
padding:0 !important;
margin:0 !important;
border-radius:0 !important;
box-shadow:none !important;
overflow:visible !important;
}

.report-title{
color:#000000 !important;
font-size:24px !important;
font-weight:900 !important;
text-align:center !important;
margin-bottom:8px !important;
}

.report-subtitle{
color:#000000 !important;
font-size:14px !important;
text-align:center !important;
margin-bottom:10px !important;
}

.stats-grid{
display:grid !important;
grid-template-columns:repeat(2,1fr) !important;
gap:6px !important;
margin-bottom:10px !important;
}

.stat-card{
background:#ffffff !important;
border:1px solid #000000 !important;
padding:6px !important;
border-radius:5px !important;
color:#000000 !important;
}

.stat-title{
color:#000000 !important;
font-size:12px !important;
margin-bottom:2px !important;
}

.stat-number{
color:#000000 !important;
font-size:16px !important;
font-weight:900 !important;
}

table{
width:100% !important;
min-width:0 !important;
font-size:11px !important;
border-collapse:collapse !important;
table-layout:fixed !important;
background:#ffffff !important;
direction:rtl !important;
}

thead{
display:table-header-group !important;
}

tr{
page-break-inside:avoid !important;
}

th{
background:#ffffff !important;
color:#000000 !important;
border:1px solid #000000 !important;
padding:4px !important;
font-size:11px !important;
font-weight:900 !important;
white-space:normal !important;
text-align:center !important;
word-break:break-word !important;
}

td{
background:#ffffff !important;
color:#000000 !important;
border:1px solid #000000 !important;
padding:4px !important;
font-size:11px !important;
font-weight:700 !important;
white-space:normal !important;
vertical-align:middle !important;
text-align:center !important;
word-break:break-word !important;
}

td *,
th *,
div,
span{
background:transparent !important;
color:#000000 !important;
box-shadow:none !important;
}

.score-line,
.percent-line{
direction:ltr !important;
unicode-bidi:embed !important;
}

td:first-child,
th:first-child{
min-width:80px !important;
max-width:100px !important;
font-weight:900 !important;
}

.student-name{
color:#000000 !important;
font-weight:900 !important;
}

.legend{
display:block !important;
text-align:center !important;
font-size:11px !important;
margin:8px 0 8px !important;
color:#000000 !important;
}

.report-footer{
display:grid !important;
grid-template-columns:1fr 1fr 1fr !important;
gap:18px !important;
margin-top:12px !important;
padding-top:8px !important;
border-top:1px solid #000000 !important;
font-size:11px !important;
color:#000000 !important;
align-items:end !important;
}

.signature-line{
display:block !important;
border-bottom:1px dotted #000000 !important;
height:18px !important;
margin-top:6px !important;
}

}

</style>

</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">

<div class="logo-box">
Rased<br>
Insights
</div>

<div class="user-box">

<div class="user-title">
التقارير
</div>

<div class="user-name">
قسم اللغة الإنجليزية
</div>

</div>

<div class="menu print-actions">

<button onclick="window.print()">
طباعة التقرير
</button>

<button onclick="window.location.href='supervisor.html'">
رجوع للمشرف
</button>

<button
class="logout-btn"
onclick="logout()"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div class="section active-section">

<div class="report-title">
متابعة درجات الطلاب في اختبارات مادة اللغة الإنجليزية
</div>

<div
class="report-subtitle"
id="reportSubtitle"
>
اختر المعلم والفصل لعرض التقرير
</div>

<div
class="filters-area"
style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:25px;
"
>

<div class="input-group">

<select id="teacherSelect">
<option>اختر المعلم</option>
</select>

</div>

<div class="input-group">

<select id="classSelect">
<option>اختر الفصل</option>
</select>

</div>

</div>

<div
class="stats-grid"
style="margin-bottom:25px;"
>

<div class="stat-card">
<div class="stat-title">عدد الطلاب</div>
<div class="stat-number" id="studentsCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">متوسط الفصل</div>
<div class="stat-number" id="classAverage">0%</div>
</div>

<div class="stat-card">
<div class="stat-title">طلاب في تحسن</div>
<div class="stat-number" id="improvedCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">طلاب في تراجع</div>
<div class="stat-number" id="declinedCount">0</div>
</div>

</div>

<div style="overflow:auto;">

<table>

<thead id="tableHead"></thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="legend">
↑ تحسن &nbsp;&nbsp;&nbsp;
↓ تراجع &nbsp;&nbsp;&nbsp;
→ ثابت
</div>

<div class="report-footer">

<div style="text-align:right;">

<div>
مشرف اللغة الإنجليزية
</div>

<div
style="
font-weight:900;
margin-top:4px;
"
>

محمد عامر أحمد

</div>

</div>

<div style="text-align:center;">

<div>
التوقيع
</div>

<span class="signature-line"></span>

</div>

<div style="text-align:left;">

<div>
تصميم
</div>

<div
style="
font-weight:900;
margin-top:4px;
"
>

محمد عامر أحمد

</div>

<div
id="printDate"
style="margin-top:4px;"
></div>

</div>

</div>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if(
localStorage.getItem("rasedRole")
!== "supervisor"
){

window.location.href =
"index.html";

}

const teacherSelect =
document.getElementById(
"teacherSelect"
);

const classSelect =
document.getElementById(
"classSelect"
);

const tableHead =
document.getElementById(
"tableHead"
);

const tableBody =
document.getElementById(
"tableBody"
);

const reportSubtitle =
document.getElementById(
"reportSubtitle"
);

const printDate =
document.getElementById(
"printDate"
);

printDate.innerText =
"التاريخ: "
+
new Date().toLocaleDateString("ar-SA");

let exams = [];
let allGrades = [];

async function loadTeachers(){

teacherSelect.innerHTML =
"<option>اختر المعلم</option>";

const snapshot =
await getDocs(
collection(db,"teachers")
);

const teachers = [];

snapshot.forEach(item=>{

teachers.push(
item.data().name
);

});

teachers.sort((a,b)=>
a.localeCompare(b,"ar")
);

teachers.forEach(name=>{

teacherSelect.innerHTML += `
<option>
${name}
</option>
`;

});

}

async function loadExams(){

exams = [];

const snapshot =
await getDocs(
collection(db,"exams")
);

snapshot.forEach(item=>{

const data =
item.data();

exams.push({

examName:
data.examName,

maxDegree:
Number(
data.maxDegree || 0
),

order:
Number(
data.order || 999
)

});

});

exams.sort((a,b)=>
a.order - b.order
);

}

async function loadAllGrades(){

allGrades = [];

const snapshot =
await getDocs(
collection(db,"grades")
);

snapshot.forEach(item=>{

allGrades.push({
id:item.id,
...item.data()
});

});

}

teacherSelect.addEventListener(
"change",
loadTeacherClasses
);

classSelect.addEventListener(
"change",
loadReport
);

async function loadTeacherClasses(){

classSelect.innerHTML =
"<option>اختر الفصل</option>";

tableHead.innerHTML = "";
tableBody.innerHTML = "";

const teacherName =
teacherSelect.value;

if(
teacherName ===
"اختر المعلم"
){
return;
}

const snapshot =
await getDocs(

query(

collection(
db,
"assignments"
),

where(
"teacherName",
"==",
teacherName
)

)

);

const classes = [];

snapshot.forEach(item=>{

classes.push(
item.data().className
);

});

classes.sort((a,b)=>
a.localeCompare(b,"ar")
);

classes.forEach(className=>{

classSelect.innerHTML += `
<option>
${className}
</option>
`;

});

}

function getChangeLabel(
currentPercent,
previousPercent
){

if(previousPercent === null){

return{
text:"-",
key:"none"
};

}

if(currentPercent > previousPercent){

return{
text:"↑ تحسن",
key:"up"
};

}

if(currentPercent < previousPercent){

return{
text:"↓ تراجع",
key:"down"
};

}

return{
text:"→ ثابت",
key:"stable"
};

}

function getOverallStatus(changes){

const up =
changes.filter(
item=>item==="up"
).length;

const down =
changes.filter(
item=>item==="down"
).length;

if(up > down){

return{
text:"تحسن",
key:"up"
};

}

if(down > up){

return{
text:"تراجع",
key:"down"
};

}

return{
text:"ثابت",
key:"stable"
};

}

async function loadReport(){

tableHead.innerHTML = "";

tableBody.innerHTML = `
<tr>
<td colspan="50">
جاري تحميل التقرير...
</td>
</tr>
`;

const teacherName =
teacherSelect.value;

const className =
classSelect.value;

if(

teacherName ===
"اختر المعلم"

||

className ===
"اختر الفصل"

){

tableBody.innerHTML = "";
return;

}

reportSubtitle.innerText =
`المعلم: ${teacherName} | الفصل: ${className}`;

await loadAllGrades();

let head = `
<tr>
<th>اسم الطالب</th>
`;

exams.forEach(exam=>{

head += `
<th>
${exam.examName}
<br>
من ${exam.maxDegree}
</th>
`;

});

head += `
<th>المتوسط</th>
<th>الاتجاه</th>
</tr>
`;

tableHead.innerHTML = head;

const studentsSnapshot =
await getDocs(

query(

collection(
db,
"students"
),

where(
"className",
"==",
className
)

)

);

const students = [];

studentsSnapshot.forEach(studentDoc=>{

students.push(
studentDoc.data()
);

});

students.sort((a,b)=>

a.name.localeCompare(
b.name,
'ar'
)

);

let studentsCount = 0;
let classTotalPercent = 0;
let improvedCount = 0;
let declinedCount = 0;

let html = "";

for(const student of students){

studentsCount++;

let row = `
<tr>

<td class="student-name">
${student.name}
</td>
`;

let previousPercent = null;
let changes = [];

let studentTotalPercent = 0;
let studentGradeCount = 0;

for(const exam of exams){

const gradeData =
allGrades.find(item=>

item.studentName ===
student.name

&&

item.className ===
className

&&

item.examName ===
exam.examName

&&

item.teacherName ===
teacherName

);

if(gradeData){

const percent =

exam.maxDegree

?

Math.round(

(
Number(
gradeData.grade
)

/

Number(
exam.maxDegree
)

)

* 100

)

:0;

const change =
getChangeLabel(
percent,
previousPercent
);

if(change.key !== "none"){
changes.push(change.key);
}

previousPercent = percent;

studentTotalPercent += percent;
studentGradeCount++;

row += `

<td>

<div
class="score-line"
style="font-weight:800;"
>

${gradeData.grade}
/
${exam.maxDegree}

</div>

<div
class="percent-line"
style="font-weight:700;"
>

${percent}%

</div>

<div style="font-weight:900;">

${change.text}

</div>

</td>

`;

}else{

row += `<td>-</td>`;

}

}

const average =

studentGradeCount

?

Math.round(
studentTotalPercent
/
studentGradeCount
)

:0;

classTotalPercent += average;

const overall =
getOverallStatus(
changes
);

if(overall.key === "up"){
improvedCount++;
}

if(overall.key === "down"){
declinedCount++;
}

row += `

<td
class="percent-line"
style="font-weight:900;"
>

${average}%

</td>

<td style="font-weight:900;">

${overall.text}

</td>

</tr>

`;

html += row;

}

tableBody.innerHTML = html;

document.getElementById(
"studentsCount"
).innerText =
studentsCount;

document.getElementById(
"classAverage"
).innerText =

studentsCount

?

Math.round(
classTotalPercent
/
studentsCount
)
+
"%"

:

"0%";

document.getElementById(
"improvedCount"
).innerText =
improvedCount;

document.getElementById(
"declinedCount"
).innerText =
declinedCount;

}

window.logout =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

await loadExams();
await loadTeachers();

</script>

</body>

</html>
