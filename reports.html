<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Reports</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">

<div class="logo-box">
Rased<br>
Insights
</div>

<div class="user-box">

<div class="user-title">
التقارير العامة
</div>

<div class="user-name">
قسم اللغة الإنجليزية
</div>

</div>

<div class="menu">

<button onclick="showSection('summarySection')">
ملخص النتائج
</button>

<button onclick="showSection('topStudentsSection')">
الطلاب الأعلى
</button>

<button onclick="showSection('statisticsSection')">
الإحصائيات
</button>

<button
class="logout-btn"
onclick="logout()"
>
خروج
</button>

</div>

</div>

<div class="main">

<div
class="section active-section"
id="summarySection"
>

<div class="section-header">

<div class="section-title">
ملخص نتائج الطلاب
</div>

</div>

<table>

<thead>

<tr>

<th>
الطالب
</th>

<th>
الفصل
</th>

<th>
الاختبار
</th>

<th>
الدرجة
</th>

<th>
المعلم
</th>

</tr>

</thead>

<tbody id="summaryTable"></tbody>

</table>

</div>

<div
class="section"
id="topStudentsSection"
>

<div class="section-header">

<div class="section-title">
الطلاب الأعلى درجات
</div>

</div>

<table>

<thead>

<tr>

<th>
الترتيب
</th>

<th>
الطالب
</th>

<th>
الفصل
</th>

<th>
الدرجة
</th>

</tr>

</thead>

<tbody id="topStudentsTable"></tbody>

</table>

</div>

<div
class="section"
id="statisticsSection"
>

<div class="section-header">

<div class="section-title">
الإحصائيات العامة
</div>

</div>

<div class="stats-grid">

<div class="stat-card">

<div class="stat-title">
عدد الطلاب
</div>

<div
class="stat-number"
id="studentsCount"
>
0
</div>

</div>

<div class="stat-card">

<div class="stat-title">
عدد الاختبارات
</div>

<div
class="stat-number"
id="examsCount"
>
0
</div>

</div>

<div class="stat-card">

<div class="stat-title">
متوسط الدرجات
</div>

<div
class="stat-number"
id="averageGrade"
>
0
</div>

</div>

</div>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove(
"active-section"
);

});

document
.getElementById(id)
.classList.add(
"active-section"
);

};

async function loadReports(){

const snapshot =
await getDocs(
collection(db,"grades")
);

const summaryTable =
document.getElementById(
"summaryTable"
);

const topStudentsTable =
document.getElementById(
"topStudentsTable"
);

summaryTable.innerHTML = "";

let grades = [];

snapshot.forEach(item=>{

const data =
item.data();

grades.push(data);

summaryTable.innerHTML += `

<tr>

<td>
${data.studentName}
</td>

<td>
${data.className}
</td>

<td>
${data.examName}
</td>

<td>
${data.grade}
</td>

<td>
${data.teacherName}
</td>

</tr>

`;

});

grades.sort(
(a,b)=>
Number(b.grade)
-
Number(a.grade)
);

topStudentsTable.innerHTML = "";

grades
.slice(0,10)
.forEach((student,index)=>{

topStudentsTable.innerHTML += `

<tr>

<td>
${index + 1}
</td>

<td>
${student.studentName}
</td>

<td>
${student.className}
</td>

<td>
${student.grade}
</td>

</tr>

`;

});

document
.getElementById("studentsCount")
.innerText =
grades.length;

document
.getElementById("examsCount")
.innerText =
new Set(
grades.map(
g=>g.examName
)
).size;

let total = 0;

grades.forEach(g=>{

total +=
Number(g.grade);

});

document
.getElementById("averageGrade")
.innerText =

grades.length
?

Math.round(
total / grades.length
)

:

0;

}

window.logout =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

loadReports();

</script>

</body>

</html>
