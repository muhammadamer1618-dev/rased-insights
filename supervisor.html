<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Supervisor Panel</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">

<div class="logo-box">
Rased<br>
Insights
</div>

<div class="user-box">

<div class="user-title">
المشرف الحالي
</div>

<div
class="user-name"
id="supervisorName"
>
Supervisor
</div>

</div>

<div class="menu">

<button onclick="showSection('reportsSection')">
التقارير
</button>

<button
class="logout-btn"
onclick="logout()"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div
class="section active-section"
id="reportsSection"
>

<div class="section-header">

<div class="section-title">
تقارير الطلاب
</div>

</div>

<div
style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:25px;
"
>

<div class="input-group">

<select id="teacherSelect">
<option>
اختر المعلم
</option>
</select>

</div>

<div class="input-group">

<select id="classSelect">
<option>
اختر الفصل
</option>
</select>

</div>

<div class="input-group">

<select id="examSelect">

<option>
كل الاختبارات
</option>

<option>
الاختبار الدوري الأول
</option>

<option>
الاختبار الدوري الثاني
</option>

<option>
الاختبار الدوري الثالث
</option>

<option>
الاختبار الدوري الرابع
</option>

<option>
الاختبار الدوري الخامس
</option>

<option>
الاختبار الدوري السادس
</option>

<option>
الاختبار الدوري السابع
</option>

<option>
الاختبار الدوري الثامن
</option>

<option>
اختبار الفترة الأولى
</option>

<option>
اختبار الفترة الثانية
</option>

</select>

</div>

</div>

<table>

<thead>

<tr>

<th>
اسم الطالب
</th>

<th>
الفصل
</th>

<th>
المادة
</th>

<th>
الاختبار
</th>

<th>
الدرجة
</th>

<th>
المعلم
</th>

</tr>

</thead>

<tbody id="reportsTable"></tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if(
localStorage.getItem("rasedRole")
!== "supervisor"
){

window.location.href =
"index.html";

}

document
.getElementById("supervisorName")
.innerText =
localStorage.getItem(
"supervisorName"
);

window.showSection =
function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove(
"active-section"
);

});

document
.getElementById(id)
.classList.add(
"active-section"
);

};

const teacherSelect =
document.getElementById(
"teacherSelect"
);

const classSelect =
document.getElementById(
"classSelect"
);

const examSelect =
document.getElementById(
"examSelect"
);

const reportsTable =
document.getElementById(
"reportsTable"
);

async function loadTeachers(){

const snapshot =
await getDocs(
collection(db,"teachers")
);

snapshot.forEach(item=>{

const data =
item.data();

teacherSelect.innerHTML += `

<option>
${data.name}
</option>

`;

});

}

teacherSelect.addEventListener(
"change",
loadTeacherClasses
);

async function loadTeacherClasses(){

classSelect.innerHTML = `
<option>
اختر الفصل
</option>
`;

const teacherName =
teacherSelect.value;

const snapshot =
await getDocs(
query(
collection(db,"assignments"),
where(
"teacherName",
"==",
teacherName
)
)
);

snapshot.forEach(item=>{

const data =
item.data();

classSelect.innerHTML += `

<option>
${data.className}
</option>

`;

});

loadReports();

}

classSelect.addEventListener(
"change",
loadReports
);

examSelect.addEventListener(
"change",
loadReports
);

async function loadReports(){

reportsTable.innerHTML = "";

const teacherName =
teacherSelect.value;

const className =
classSelect.value;

const examName =
examSelect.value;

if(
teacherName ===
"اختر المعلم"
){

return;

}

const snapshot =
await getDocs(
query(
collection(db,"grades"),
where(
"teacherName",
"==",
teacherName
)
)
);

snapshot.forEach(item=>{

const data =
item.data();

if(
className !==
"اختر الفصل"
&&
data.className !== className
){

return;

}

if(
examName !==
"كل الاختبارات"
&&
data.examName !== examName
){

return;

}

reportsTable.innerHTML += `

<tr>

<td>
${data.studentName}
</td>

<td>
${data.className}
</td>

<td>
${data.subject}
</td>

<td>
${data.examName}
</td>

<td>
${data.grade}
</td>

<td>
${data.teacherName}
</td>

</tr>

`;

});

}

window.logout =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

loadTeachers();

</script>

</body>

</html>
