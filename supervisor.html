<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

.container{
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout-btn{
background:#dc2626;
border:none;
padding:12px 18px;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.number{
font-size:32px;
font-weight:800;
color:#facc15;
}

.section{
background:#1e293b;
padding:25px;
border-radius:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

.excellent{color:#22c55e;font-weight:700;}
.weak{color:#ef4444;font-weight:700;}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>لوحة المشرف</h1>

<button class="logout-btn" onclick="logout()">
تسجيل الخروج
</button>
</div>

<div class="cards">

<div class="card">
<h3>عدد الطلاب</h3>
<div class="number" id="studentsCount">0</div>
</div>

<div class="card">
<h3>المتفوقين</h3>
<div class="number" id="excellentCount">0</div>
</div>

<div class="card">
<h3>الضعاف</h3>
<div class="number" id="weakCount">0</div>
</div>

</div>

<div class="section">

<h2>متابعة الأداء</h2>

<table>

<thead>
<tr>
<th>الطالب</th>
<th>المتوسط</th>
<th>الحالة</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

</div>

<script>

/* AUTH CHECK */
const user = JSON.parse(localStorage.getItem("currentUser"));

if(!user || user.role !== "supervisor"){
window.location.href = "index.html";
}

/* DATA */
function loadDashboard(){

const students = JSON.parse(localStorage.getItem("students")) || [];

document.getElementById("studentsCount").innerText = students.length;

let excellent = 0;
let weak = 0;

const tbody = document.getElementById("studentsTable");
tbody.innerHTML = "";

/* simulate grades if not exist */
students.forEach(s=>{

let avg = s.avg || Math.floor(Math.random()*100);

let status = "";

if(avg >= 85){
status = `<span class="excellent">ممتاز ↑</span>`;
excellent++;
}
else if(avg >= 60){
status = "جيد";
}
else{
status = `<span class="weak">ضعيف ↓</span>`;
weak++;
}

tbody.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${avg}</td>
<td>${status}</td>
</tr>
`;

});

document.getElementById("excellentCount").innerText = excellent;
document.getElementById("weakCount").innerText = weak;

}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="index.html";
}

loadDashboard();

</script>

</body>
</html>
