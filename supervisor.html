<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supervisor Panel</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="dashboard-layout">

<div class="sidebar">
  <div class="logo-box">Rased<br>Insights</div>

  <div class="user-box">
    <div class="user-title">المشرف الحالي</div>
    <div class="user-name" id="supervisorName">Supervisor</div>
  </div>

  <div class="menu">
    <button onclick="showSection('reportsSection')">متابعة النتائج</button>
    <button onclick="window.location.href='reports.html'">التقارير التحليلية</button>
    <button onclick="archiveResults()">أرشفة النتائج</button>
    <button onclick="window.location.href='archive.html'">عرض الأرشيف</button>
    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div class="main">

<div class="section active-section" id="reportsSection">

  <div class="section-header">
    <div class="section-title">متابعة نتائج الطلاب</div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:25px;">
    <div class="input-group">
      <select id="teacherSelect">
        <option>اختر المعلم</option>
      </select>
    </div>

    <div class="input-group">
      <select id="classSelect">
        <option>اختر الفصل</option>
      </select>
    </div>
  </div>

  <div style="overflow:auto;">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  query,
  where,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

if (localStorage.getItem("rasedRole") !== "supervisor") {
  window.location.href = "index.html";
}

document.getElementById("supervisorName").innerText =
  localStorage.getItem("supervisorName") || "Supervisor";

const teacherSelect = document.getElementById("teacherSelect");
const classSelect = document.getElementById("classSelect");
const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");

let exams = [];
let allGrades = [];
let currentStudents = [];

window.showSection = function(id) {
  document.querySelectorAll(".section").forEach(section => {
    section.classList.remove("active-section");
  });

  document.getElementById(id).classList.add("active-section");
};

async function loadTeachers() {
  teacherSelect.innerHTML = "<option>اختر المعلم</option>";

  const snapshot = await getDocs(collection(db, "teachers"));

  const teachers = [];

  snapshot.forEach(item => {
    teachers.push(item.data().name);
  });

  teachers.sort((a, b) =>
    a.localeCompare(b, "ar")
  );

  teachers.forEach(name => {
    teacherSelect.innerHTML += `
      <option>${name}</option>
    `;
  });
}

async function loadExams() {
  exams = [];

  const snapshot = await getDocs(collection(db, "exams"));

  snapshot.forEach(item => {
    const data = item.data();

    exams.push({
      examName: data.examName,
      maxDegree: Number(data.maxDegree || 0),
      order: Number(data.order || 999)
    });
  });

  exams.sort((a, b) => a.order - b.order);
}

async function loadAllGrades() {
  allGrades = [];

  const snapshot = await getDocs(collection(db, "grades"));

  snapshot.forEach(item => {
    allGrades.push({
      id: item.id,
      ...item.data()
    });
  });
}

teacherSelect.addEventListener("change", loadTeacherClasses);
classSelect.addEventListener("change", loadReportTable);

async function loadTeacherClasses() {
  classSelect.innerHTML = "<option>اختر الفصل</option>";
  tableHead.innerHTML = "";
  tableBody.innerHTML = "";

  const teacherName = teacherSelect.value;

  if (teacherName === "اختر المعلم") {
    return;
  }

  const snapshot = await getDocs(
    query(
      collection(db, "assignments"),
      where("teacherName", "==", teacherName)
    )
  );

  const classes = [];

  snapshot.forEach(item => {
    classes.push(item.data().className);
  });

  classes.sort((a, b) =>
    a.localeCompare(b, "ar")
  );

  classes.forEach(className => {
    classSelect.innerHTML += `
      <option>${className}</option>
    `;
  });
}

function getChangeLabel(currentPercent, previousPercent) {
  if (previousPercent === null) {
    return {
      text: "-",
      color: "#94a3b8"
    };
  }

  if (currentPercent > previousPercent) {
    return {
      text: "↑ تحسن",
      color: "#22c55e"
    };
  }

  if (currentPercent < previousPercent) {
    return {
      text: "↓ تراجع",
      color: "#ef4444"
    };
  }

  return {
    text: "→ ثابت",
    color: "#facc15"
  };
}

function getOverallStatus(changes) {
  const up = changes.filter(item => item === "up").length;
  const down = changes.filter(item => item === "down").length;

  if (up > down) {
    return {
      text: "تحسن عام",
      color: "#22c55e"
    };
  }

  if (down > up) {
    return {
      text: "تراجع عام",
      color: "#ef4444"
    };
  }

  return {
    text: "ثابت",
    color: "#facc15"
  };
}

async function loadReportTable() {
  tableHead.innerHTML = "";

  tableBody.innerHTML = `
    <tr class="loading-row">
      <td colspan="50">جاري تحميل النتائج...</td>
    </tr>
  `;

  const teacherName = teacherSelect.value;
  const className = classSelect.value;

  if (
    teacherName === "اختر المعلم" ||
    className === "اختر الفصل"
  ) {
    tableBody.innerHTML = "";
    return;
  }

  await loadAllGrades();

  if (exams.length === 0) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="50">لا توجد اختبارات</td>
      </tr>
    `;
    return;
  }

  let head = `
    <tr>
      <th>اسم الطالب</th>
  `;

  exams.forEach(exam => {
    head += `
      <th>
        ${exam.examName}
        <br>
        من ${exam.maxDegree}
      </th>
    `;
  });

  head += `
      <th>المستوى العام</th>
      <th>واتساب</th>
    </tr>
  `;

  tableHead.innerHTML = head;

  const studentsSnapshot = await getDocs(
    query(
      collection(db, "students"),
      where("className", "==", className)
    )
  );

  currentStudents = [];

  studentsSnapshot.forEach(studentDoc => {
    currentStudents.push(studentDoc.data());
  });

  currentStudents.sort((a, b) =>
    a.name.localeCompare(b.name, "ar")
  );

  let html = "";

  for (const student of currentStudents) {
    html += `
      <tr>
        <td class="student-name">
          ${student.name}
        </td>
    `;

    let previousPercent = null;
    let changes = [];

    for (const exam of exams) {
      const gradeData = allGrades.find(item =>
        item.studentName === student.name &&
        item.className === className &&
        item.examName === exam.examName &&
        item.teacherName === teacherName
      );

      if (gradeData && gradeData.grade !== "") {
        const percent = exam.maxDegree
          ? Math.round((Number(gradeData.grade) / Number(exam.maxDegree)) * 100)
          : 0;

        const change = getChangeLabel(percent, previousPercent);

        if (previousPercent !== null) {
          if (percent > previousPercent) {
            changes.push("up");
          } else if (percent < previousPercent) {
            changes.push("down");
          } else {
            changes.push("stable");
          }
        }

        previousPercent = percent;

        let color = "#facc15";

        if (percent >= 85) {
          color = "#22c55e";
        } else if (percent < 60) {
          color = "#ef4444";
        }

        html += `
          <td>
            <div style="color:${color};font-weight:800;">
              ${gradeData.grade} / ${exam.maxDegree}
            </div>

            <div style="color:${color};font-weight:700;">
              ${percent}%
            </div>

            <div style="color:${change.color};font-weight:900;margin-top:6px;">
              ${change.text}
            </div>
          </td>
        `;
      } else {
        html += `<td>-</td>`;
      }
    }

    const overall = getOverallStatus(changes);

    html += `
        <td style="color:${overall.color};font-weight:900;">
          ${overall.text}
        </td>

        <td>
          <button
            class="primary-btn"
            style="background:#16a34a;color:white;padding:8px 12px;font-size:12px;"
            onclick="sendWhatsApp('${encodeURIComponent(student.name)}')"
          >
            إرسال
          </button>
        </td>
      </tr>
    `;
  }

  tableBody.innerHTML = html;
}

function cleanPhone(phone) {
  let value = String(phone || "").trim();

  value = value.replace(/[^\d]/g, "");

  if (value.startsWith("00")) {
    value = value.slice(2);
  }

  if (value.startsWith("0")) {
    value = "966" + value.slice(1);
  }

  if (!value.startsWith("966")) {
    value = "966" + value;
  }

  return value;
}

window.sendWhatsApp = function(encodedStudentName) {
  const studentName = decodeURIComponent(encodedStudentName);
  const teacherName = teacherSelect.value;
  const className = classSelect.value;

  const student = currentStudents.find(item =>
    item.name === studentName
  );

  if (!student || !student.guardianPhone) {
    alert("رقم ولي الأمر غير موجود لهذا الطالب");
    return;
  }

  const studentGrades = [];

  exams.forEach(exam => {
    const gradeData = allGrades.find(item =>
      item.studentName === studentName &&
      item.className === className &&
      item.examName === exam.examName &&
      item.teacherName === teacherName
    );

    if (gradeData && gradeData.grade !== "") {
      studentGrades.push(
        `${exam.examName}: ${gradeData.grade} / ${exam.maxDegree}`
      );
    }
  });

  if (studentGrades.length === 0) {
    alert("لا توجد درجات مرصودة لهذا الطالب");
    return;
  }

  const message =
`السلام عليكم ورحمة الله وبركاته

ولي أمر الطالب: ${studentName}
الفصل: ${className}

نحيطكم علمًا بدرجات الطالب في اختبارات مادة اللغة الإنجليزية:

${studentGrades.join("\n")}

مع تمنياتنا له بالتوفيق والنجاح.`;

  const phone = cleanPhone(student.guardianPhone);

  const url =
    `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
};

window.archiveResults = async function() {
  const snapshot = await getDocs(collection(db, "grades"));

  for (const item of snapshot.docs) {
    const data = item.data();

    await addDoc(collection(db, "archive"), {
      studentName: data.studentName,
      className: data.className,
      subject: data.subject,
      examName: data.examName,
      grade: data.grade,
      maxDegree: data.maxDegree || "",
      teacherName: data.teacherName,
      archivedAt: new Date().toLocaleString()
    });
  }

  alert("تمت أرشفة النتائج");
};

window.logout = function() {
  localStorage.clear();
  window.location.href = "index.html";
};

await loadExams();
await loadTeachers();

</script>

</body>
</html>
