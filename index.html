<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Rased Insights</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .bg-glow-1 {
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.12);
      filter: blur(90px);
      top: -150px;
      left: -100px;
    }

    .bg-glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(250, 204, 21, 0.12);
      filter: blur(90px);
      bottom: -150px;
      right: -100px;
    }

    .login-card {
      width: 95%;
      max-width: 450px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      padding: 40px 30px;
      position: relative;
      z-index: 10;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 25px;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      margin: auto;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 800;
      color: #0f172a;
      box-shadow: 0 10px 30px rgba(250,204,21,0.3);
    }

    h1 {
      text-align: center;
      color: white;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .school {
      text-align: center;
      color: #f8fafc;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .department {
      text-align: center;
      color: #facc15;
      font-size: 14px;
      margin-bottom: 35px;
    }

    .roles-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 25px;
    }

    .role-btn {
      border: none;
      padding: 15px;
      border-radius: 18px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .role-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .admin-btn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    .supervisor-btn {
      background: linear-gradient(135deg, #0f766e, #115e59);
    }

    .teacher-btn {
      background: linear-gradient(135deg, #ca8a04, #a16207);
    }

    .login-form {
      display: none;
      margin-top: 15px;
    }

    #loginTitle {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 700;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-group input::placeholder {
      color: #cbd5e1;
    }

    .login-btn {
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    .status {
      margin-top: 18px;
      text-align: center;
      color: #f8fafc;
      font-size: 14px;
      min-height: 20px;
    }

    .footer {
      margin-top: 35px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    @media (max-width: 500px) {

      .login-card {
        padding: 35px 22px;
      }

      h1 {
        font-size: 28px;
      }

    }

  </style>

</head>

<body>

  <div class="bg-glow-1"></div>

  <div class="bg-glow-2"></div>

  <div class="login-card">

    <div class="logo">
      E
    </div>

    <h1>Rased Insights</h1>

    <div class="school">
      مدارس الفلاح الأهلية
    </div>

    <div class="department">
      قسم اللغة الإنجليزية
    </div>

    <div class="roles-container">

      <button
        class="role-btn admin-btn"
        onclick="selectRole('admin')"
      >
        دخول الأدمن
      </button>

      <button
        class="role-btn supervisor-btn"
        onclick="selectRole('supervisor')"
      >
        دخول المشرف
      </button>

      <button
        class="role-btn teacher-btn"
        onclick="selectRole('teacher')"
      >
        دخول المعلم
      </button>

    </div>

    <div class="login-form" id="loginForm">

      <h3 id="loginTitle"></h3>

      <div class="input-group">

        <input
          type="email"
          id="email"
          placeholder="البريد الإلكتروني"
        />

      </div>

      <div class="input-group">

        <input
          type="password"
          id="password"
          placeholder="كلمة المرور"
        />

      </div>

      <button
        class="login-btn"
        id="loginBtn"
      >
        تسجيل الدخول
      </button>

      <div
        class="status"
        id="status"
      ></div>

    </div>

    <div class="footer">
      تصميم محمد عامر أحمد
    </div>

  </div>

  <script type="module">

    import {
      initializeApp
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {

      apiKey: "AIzaSyAalS33kADTW9D2RkXXZ27n9TFvd9TAVJM",

      authDomain: "englis-results.firebaseapp.com",

      projectId: "englis-results",

      storageBucket: "englis-results.firebasestorage.app",

      messagingSenderId: "467628171773",

      appId: "1:467628171773:web:26d848542fdb89aea17994"

    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    let currentRole = "";

    window.selectRole = function(role) {

      currentRole = role;

      const loginForm =
        document.getElementById("loginForm");

      const loginTitle =
        document.getElementById("loginTitle");

      loginForm.style.display = "block";

      if (role === "admin") {

        loginTitle.innerText =
          "تسجيل دخول الأدمن";

      }

      else if (role === "supervisor") {

        loginTitle.innerText =
          "تسجيل دخول المشرف";

      }

      else {

        loginTitle.innerText =
          "تسجيل دخول المعلم";

      }

    };

    const loginBtn =
      document.getElementById("loginBtn");

    const status =
      document.getElementById("status");

    loginBtn.addEventListener("click", async () => {

      const email =
        document.getElementById("email")
        .value
        .trim();

      const password =
        document.getElementById("password")
        .value
        .trim();

      if (!email || !password) {

        status.innerText =
          "يرجى إدخال البريد وكلمة المرور";

        return;

      }

      try {

        loginBtn.disabled = true;

        status.innerText =
          "جاري تسجيل الدخول...";

        await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

        status.innerText =
          "تم تسجيل الدخول بنجاح";

        setTimeout(() => {

          if (currentRole === "admin") {

            window.location.href =
              "dashboard.html";

          }

          else if (
            currentRole === "supervisor"
          ) {

            window.location.href =
              "supervisor.html";

          }

          else {

            window.location.href =
              "teacher.html";

          }

        }, 1000);

      }

      catch (error) {

        console.error(error);

        status.innerText =
          "البريد الإلكتروني أو كلمة المرور غير صحيحة";

      }

      finally {

        loginBtn.disabled = false;

      }

    });

  </script>

</body>

</html>
