<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rased Insights</title>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="logo">
R
</div>

<div class="title">
Rased Insights
</div>

<div class="school">
مدارس الفلاح الأهلية
</div>

<div class="department">
قسم اللغة الإنجليزية
</div>

<div class="roles">

<button
class="role-btn admin-btn"
onclick="selectRole('admin')"
>
دخول الأدمن
</button>

<button
class="role-btn supervisor-btn"
onclick="selectRole('supervisor')"
>
دخول المشرف
</button>

<button
class="role-btn teacher-btn"
onclick="selectRole('teacher')"
>
دخول المعلم
</button>
<button class="parent-btn"
onclick="window.location.href='parent.html'">
نتائج الطلاب
</button>
</div>

<div class="login-form" id="loginForm">

<div class="input-group">

<input
type="text"
id="username"
placeholder="Username"
/>

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="Password"
/>

</div>

<button
class="submit-btn"
id="loginBtn"
>
تسجيل الدخول
</button>

<div
class="status"
id="status"
></div>

</div>

<div class="footer">
تصميم محمد عامر أحمد
</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

let currentRole = "";

window.selectRole = function(role){

currentRole = role;

document
.getElementById("loginForm")
.style.display = "block";

};

document
.getElementById("loginBtn")
.addEventListener("click",async()=>{

const username =
document
.getElementById("username")
.value
.trim();

const password =
document
.getElementById("password")
.value
.trim();

const status =
document
.getElementById("status");

if(!username || !password){

status.innerText =
"أدخل البيانات";

return;

}

status.innerText =
"جاري تسجيل الدخول...";

try{

if(currentRole === "admin"){

if(
username === "admin" &&
password === "admin123"
){

localStorage.setItem(
"rasedRole",
"admin"
);

window.location.href =
"dashboard.html";

return;

}

status.innerText =
"بيانات الأدمن غير صحيحة";

return;

}

if(currentRole === "teacher"){

const snapshot =
await getDocs(
collection(db,"teachers")
);

let found = false;

snapshot.forEach(doc=>{

const data = doc.data();

if(
data.username === username &&
data.password === password
){

found = true;

localStorage.setItem(
"rasedRole",
"teacher"
);

localStorage.setItem(
"teacherName",
data.name
);

window.location.href =
"teacher.html";

}

});

if(!found){

status.innerText =
"بيانات المعلم غير صحيحة";

}

}

if(currentRole === "supervisor"){

const snapshot =
await getDocs(
collection(db,"supervisors")
);

let found = false;

snapshot.forEach(doc=>{

const data = doc.data();

if(
data.username === username &&
data.password === password
){

found = true;

localStorage.setItem(
"rasedRole",
"supervisor"
);

localStorage.setItem(
"supervisorName",
data.name
);

window.location.href =
"supervisor.html";

}

});

if(!found){

status.innerText =
"بيانات المشرف غير صحيحة";

}

}

}

catch(error){

console.error(error);

status.innerText =
"حدث خطأ";

}

});

</script>

</body>

</html>
