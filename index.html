<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Rased Insights
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:auto;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:28px;
padding:35px 25px;
}

.logo{
width:90px;
height:90px;
background:linear-gradient(135deg,#facc15,#f59e0b);
margin:auto;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:800;
color:#0f172a;
}

h1{
text-align:center;
color:white;
margin-top:18px;
font-size:32px;
}

.school{
text-align:center;
color:#e2e8f0;
margin-top:10px;
font-size:17px;
}

.department{
text-align:center;
color:#facc15;
margin-top:8px;
font-size:14px;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
margin-top:30px;
}

button{
border:none;
padding:15px;
border-radius:16px;
font-size:15px;
font-weight:700;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.admin{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.supervisor{
background:linear-gradient(135deg,#0f766e,#115e59);
}

.teacher{
background:linear-gradient(135deg,#ca8a04,#a16207);
}

.footer{
text-align:center;
color:#94a3b8;
font-size:13px;
margin-top:28px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
E
</div>

<h1>
Rased Insights
</h1>

<div class="school">
مدارس الفلاح الأهلية
</div>

<div class="department">
قسم اللغة الإنجليزية
</div>

<div class="buttons">

<button
class="admin"
onclick="window.location.href='./dashboard.html'"
>
دخول الأدمن
</button>

<button
class="supervisor"
onclick="window.location.href='./supervisor.html'"
>
دخول المشرف
</button>

<button
class="teacher"
onclick="window.location.href='./teacher.html'"
>
دخول المعلم
</button>

</div>

<div class="footer">
تصميم محمد عامر أحمد
</div>

</div>

</body>

</html>
