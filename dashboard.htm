<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Admin Dashboard | Rased Insights</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: #111827;
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 25px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #facc15;
    }

    .logo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 5px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu button {
      border: none;
      background: rgba(255,255,255,0.04);
      color: white;
      padding: 15px;
      border-radius: 16px;
      text-align: right;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu button:hover {
      background: #2563eb;
    }

    .logout-btn {
      margin-top: auto;
      background: #dc2626 !important;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .topbar h2 {
      font-size: 28px;
      font-weight: 800;
    }

    .admin-info {
      color: #cbd5e1;
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card h3 {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .card .number {
      font-size: 36px;
      font-weight: 800;
      color: #facc15;
    }

    .section {
      background: #1e293b;
      border-radius: 24px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 25px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .section-header h3 {
      font-size: 22px;
      font-weight: 700;
    }

    .add-btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      text-align: center;
      color: #f8fafc;
    }

    table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #cbd5e1;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .edit-btn,
    .delete-btn {
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    .edit-btn {
      background: #ca8a04;
    }

    .delete-btn {
      background: #dc2626;
    }

    @media (max-width: 900px) {

      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

    }

  </style>

</head>

<body>

  <aside class="sidebar">

    <div class="logo">

      <h1>Rased Insights</h1>

      <p>
        مدارس الفلاح الأهلية
      </p>

    </div>

    <div class="menu">

      <button>
        لوحة التحكم
      </button>

      <button>
        إدارة المعلمين
      </button>

      <button>
        إدارة الفصول
      </button>

      <button>
        إدارة الطلاب
      </button>

      <button>
        إدارة الاختبارات
      </button>

      <button>
        التقارير
      </button>

      <button>
        الأرشيف
      </button>

      <button class="logout-btn" id="logoutBtn">
        تسجيل الخروج
      </button>

    </div>

  </aside>

  <main class="main">

    <div class="topbar">

      <h2>
        لوحة تحكم الأدمن
      </h2>

      <div class="admin-info" id="adminEmail">
        جاري التحميل...
      </div>

    </div>

    <div class="cards">

      <div class="card">

        <h3>
          عدد الطلاب
        </h3>

        <div class="number" id="studentsCount">
          0
        </div>

      </div>

      <div class="card">

        <h3>
          عدد المعلمين
        </h3>

        <div class="number" id="teachersCount">
          0
        </div>

      </div>

      <div class="card">

        <h3>
          عدد الفصول
        </h3>

        <div class="number" id="classesCount">
          0
        </div>

      </div>

      <div class="card">

        <h3>
          عدد الاختبارات
        </h3>

        <div class="number" id="examsCount">
          0
        </div>

      </div>

    </div>

    <div class="section">

      <div class="section-header">

        <h3>
          الطلاب
        </h3>

        <button class="add-btn">
          إضافة طالب
        </button>

      </div>

      <table>

        <thead>

          <tr>

            <th>
              الاسم
            </th>

            <th>
              الفصل
            </th>

            <th>
              الرقم الأكاديمي
            </th>

            <th>
              الإجراءات
            </th>

          </tr>

        </thead>

        <tbody id="studentsTable">

        </tbody>

      </table>

    </div>

  </main>

  <script type="module">

    import {
      initializeApp
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged,
      signOut
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {

      apiKey: "AIzaSyAalS33kADTW9D2RkXXZ27n9TFvd9TAVJM",

      authDomain: "englis-results.firebaseapp.com",

      projectId: "englis-results",

      storageBucket: "englis-results.firebasestorage.app",

      messagingSenderId: "467628171773",

      appId: "1:467628171773:web:26d848542fdb89aea17994"

    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const db = getFirestore(app);

    const adminEmail =
      document.getElementById("adminEmail");

    const studentsCount =
      document.getElementById("studentsCount");

    const teachersCount =
      document.getElementById("teachersCount");

    const classesCount =
      document.getElementById("classesCount");

    const examsCount =
      document.getElementById("examsCount");

    const studentsTable =
      document.getElementById("studentsTable");

    onAuthStateChanged(auth, async (user) => {

      if (!user) {

        window.location.href = "index.html";

        return;

      }

      adminEmail.innerText = user.email;

      loadDashboardData();

    });

    async function loadDashboardData() {

      const studentsSnapshot =
        await getDocs(collection(db, "students"));

      const teachersSnapshot =
        await getDocs(collection(db, "users"));

      const classesSnapshot =
        await getDocs(collection(db, "classes"));

      const examsSnapshot =
        await getDocs(collection(db, "exams"));

      studentsCount.innerText =
        studentsSnapshot.size;

      teachersCount.innerText =
        teachersSnapshot.size;

      classesCount.innerText =
        classesSnapshot.size;

      examsCount.innerText =
        examsSnapshot.size;

      studentsTable.innerHTML = "";

      studentsSnapshot.forEach((doc) => {

        const student = doc.data();

        studentsTable.innerHTML += `

          <tr>

            <td>
              ${student.name || "-"}
            </td>

            <td>
              ${student.className || "-"}
            </td>

            <td>
              ${student.academicNumber || "-"}
            </td>

            <td>

              <div class="actions">

                <button class="edit-btn">
                  تعديل
                </button>

                <button class="delete-btn">
                  حذف
                </button>

              </div>

            </td>

          </tr>

        `;

      });

    }

    document
      .getElementById("logoutBtn")
      .addEventListener("click", async () => {

        await signOut(auth);

        window.location.href = "index.html";

      });

  </script>

</body>

</html>
