<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
display:flex;
}

.sidebar{
width:260px;
background:#111827;
padding:25px;
}

.logo{
font-size:28px;
font-weight:800;
color:#facc15;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:15px;
border-radius:16px;
cursor:pointer;
font-size:15px;
font-weight:700;
transition:.3s;
}

.menu button:hover{
background:#2563eb;
}

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:24px;
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
}

.number{
font-size:36px;
font-weight:800;
color:#facc15;
}

.section{
background:#1e293b;
padding:25px;
border-radius:24px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:rgba(255,255,255,.05);
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.action-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Rased Insights
</div>

<div class="menu">

<button>
المعلمين
</button>

<button>
الفصول
</button>

<button>
الطلاب
</button>

<button>
الاختبارات
</button>

<button onclick="window.location.href='./reports.html'">
التقارير
</button>

<button onclick="window.location.href='./index.html'">
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>
لوحة الأدمن
</h1>

</div>

<div class="cards">

<div class="card">

<h3>
عدد الطلاب
</h3>

<div class="number">
250
</div>

</div>

<div class="card">

<h3>
عدد المعلمين
</h3>

<div class="number">
12
</div>

</div>

<div class="card">

<h3>
عدد الفصول
</h3>

<div class="number">
8
</div>

</div>

</div>

<div class="section">

<h2>
آخر الطلاب
</h2>

<table>

<thead>

<tr>

<th>
الاسم
</th>

<th>
الفصل
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

<tr>

<td>
محمد أحمد
</td>

<td>
أول ثانوي A
</td>

<td>

<button class="action-btn edit">
تعديل
</button>

<button class="action-btn delete">
حذف
</button>

</td>

</tr>

<tr>

<td>
علي خالد
</td>

<td>
أول ثانوي B
</td>

<td>

<button class="action-btn edit">
تعديل
</button>

<button class="action-btn delete">
حذف
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>

</html>
