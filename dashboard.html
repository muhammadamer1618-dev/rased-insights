<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Rased Insights Dashboard
</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:300px;
background:#0f172a;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
line-height:1.4;
color:#facc15;
margin-bottom:20px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:15px;
border-radius:16px;
cursor:pointer;
font-weight:700;
font-size:15px;
transition:.3s;
}

.menu button:hover{
background:#2563eb;
}

.logout{
background:#dc2626 !important;
}

.main{
flex:1;
padding:30px;
}

.section{
background:#111827;
padding:25px;
border-radius:24px;
margin-bottom:25px;
overflow:auto;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:15px;
flex-wrap:wrap;
}

.section-header h2{
font-size:24px;
}

.add-btn{
border:none;
background:#2563eb;
color:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:rgba(255,255,255,.05);
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.action-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#0f172a;
padding:30px;
border-radius:24px;
width:100%;
max-width:450px;
}

.modal-content h2{
margin-bottom:20px;
text-align:center;
}

.input-group{
margin-bottom:15px;
}

.input-group input,
.input-group select{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
outline:none;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-actions button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
}

.save-btn{
background:#2563eb;
color:white;
}

.cancel-btn{
background:#334155;
color:white;
}

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:20px;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Rased<br>
Insights
</div>

<div class="menu">

<button onclick="openModal('teacher')">
إضافة معلم
</button>

<button onclick="openModal('supervisor')">
إضافة مشرف
</button>

<button onclick="openModal('class')">
إضافة فصل
</button>

<button onclick="openModal('student')">
إضافة طالب
</button>

<button onclick="openModal('exam')">
إضافة اختبار
</button>

<button onclick="document.getElementById('importStudents').click()">
استيراد الطلاب
</button>

<input
type="file"
id="importStudents"
accept=".csv"
style="display:none"
/>

<button
class="logout"
onclick="window.location.href='./index.html'"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div class="section">

<div class="section-header">

<h2>
المعلمين
</h2>

<button
class="add-btn"
onclick="openModal('teacher')"
>
إضافة معلم
</button>

</div>

<table id="teachersTable">

<thead>

<tr>

<th>
الاسم
</th>

<th>
Username
</th>

<th>
Password
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="section">

<div class="section-header">

<h2>
المشرفين
</h2>

<button
class="add-btn"
onclick="openModal('supervisor')"
>
إضافة مشرف
</button>

</div>

<table id="supervisorsTable">

<thead>

<tr>

<th>
الاسم
</th>

<th>
Username
</th>

<th>
Password
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="section">

<div class="section-header">

<h2>
الفصول
</h2>

<button
class="add-btn"
onclick="openModal('class')"
>
إضافة فصل
</button>

</div>

<table id="classesTable">

<thead>

<tr>

<th>
اسم الفصل
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="section">

<div class="section-header">

<h2>
الطلاب
</h2>

<button
class="add-btn"
onclick="openModal('student')"
>
إضافة طالب
</button>

</div>

<table id="studentsTable">

<thead>

<tr>

<th>
اسم الطالب
</th>

<th>
الفصل
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="section">

<div class="section-header">

<h2>
الاختبارات
</h2>

<button
class="add-btn"
onclick="openModal('exam')"
>
إضافة اختبار
</button>

</div>

<table id="examsTable">

<thead>

<tr>

<th>
اسم الاختبار
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modal"
>

<div class="modal-content">

<h2 id="modalTitle">
إضافة
</h2>

<div class="input-group">

<input
type="text"
id="nameInput"
placeholder="الاسم"
/>

</div>

<div
class="input-group"
id="usernameGroup"
>

<input
type="text"
id="usernameInput"
placeholder="Username"
/>

</div>

<div
class="input-group"
id="passwordGroup"
>

<input
type="text"
id="passwordInput"
placeholder="Password"
/>

</div>

<div
class="input-group"
id="classGroup"
style="display:none"
>

<input
type="text"
id="classInput"
placeholder="اسم الفصل"
/>

</div>

<div
class="input-group"
id="examGroup"
style="display:none"
>

<select id="examSelect">

<option>
الاختبار الدوري الأول
</option>

<option>
الاختبار الدوري الثاني
</option>

<option>
الاختبار الدوري الثالث
</option>

<option>
الاختبار الدوري الرابع
</option>

<option>
الاختبار الدوري الخامس
</option>

<option>
الاختبار الدوري السادس
</option>

<option>
الاختبار الدوري السابع
</option>

<option>
الاختبار الدوري الثامن
</option>

<option>
اختبار الفترة الأولى
</option>

<option>
اختبار الفترة الثانية
</option>

</select>

</div>

<div class="modal-actions">

<button
class="save-btn"
onclick="saveData()"
>
حفظ
</button>

<button
class="cancel-btn"
onclick="closeModal()"
>
إلغاء
</button>

</div>

</div>

</div>

<script>

const modal =
document.getElementById("modal");

const modalTitle =
document.getElementById("modalTitle");

const usernameGroup =
document.getElementById("usernameGroup");

const passwordGroup =
document.getElementById("passwordGroup");

const classGroup =
document.getElementById("classGroup");

const examGroup =
document.getElementById("examGroup");

let currentType = "";

function openModal(type){

currentType = type;

modal.style.display = "flex";

document.getElementById("nameInput").value = "";

document.getElementById("usernameInput").value = "";

document.getElementById("passwordInput").value = "";

document.getElementById("classInput").value = "";

usernameGroup.style.display =
"none";

passwordGroup.style.display =
"none";

classGroup.style.display =
"none";

examGroup.style.display =
"none";

if(type === "teacher"){

modalTitle.innerText =
"إضافة معلم";

usernameGroup.style.display =
"block";

passwordGroup.style.display =
"block";

}

else if(type === "supervisor"){

modalTitle.innerText =
"إضافة مشرف";

usernameGroup.style.display =
"block";

passwordGroup.style.display =
"block";

}

else if(type === "student"){

modalTitle.innerText =
"إضافة طالب";

classGroup.style.display =
"block";

}

else if(type === "exam"){

modalTitle.innerText =
"إضافة اختبار";

examGroup.style.display =
"block";

}

else{

modalTitle.innerText =
"إضافة فصل";

}

}

function closeModal(){

modal.style.display = "none";

}

function saveData(){

const name =
document.getElementById("nameInput").value;

const username =
document.getElementById("usernameInput").value;

const password =
document.getElementById("passwordInput").value;

const className =
document.getElementById("classInput").value;

if(currentType === "teacher"){

addTeacher(name,username,password);

saveAccount(
"teachers",
name,
username,
password
);

}

else if(currentType === "supervisor"){

addSupervisor(name,username,password);

saveAccount(
"supervisors",
name,
username,
password
);

}

else if(currentType === "student"){

addStudent(name,className);

}

else if(currentType === "class"){

addClass(name);

}

else if(currentType === "exam"){

const exam =
document.getElementById("examSelect").value;

addExam(exam);

}

closeModal();

}

function saveAccount(type,name,username,password){

const accounts =
JSON.parse(
localStorage.getItem(type)
) || [];

accounts.push({
name,
username,
password
});

localStorage.setItem(
type,
JSON.stringify(accounts)
);

}

function addTeacher(name,username,password){

const tbody =
document.querySelector("#teachersTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>${username}</td>

<td>${password}</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function addSupervisor(name,username,password){

const tbody =
document.querySelector("#supervisorsTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>${username}</td>

<td>${password}</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function addClass(name){

const tbody =
document.querySelector("#classesTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function addStudent(name,className){

const tbody =
document.querySelector("#studentsTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>${className}</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function addExam(name){

const tbody =
document.querySelector("#examsTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function deleteRow(button){

button.closest("tr").remove();

}

function editRow(button){

const row =
button.closest("tr");

const firstCell =
row.querySelector("td");

const newValue =
prompt(
"تعديل البيانات",
firstCell.innerText
);

if(newValue){

firstCell.innerText =
newValue;

}

}

document
.getElementById("importStudents")
.addEventListener("change",(e)=>{

const file =
e.target.files[0];

if(!file){

return;

}

const reader =
new FileReader();

reader.onload =
function(event){

const text =
event.target.result;

const rows =
text.split("\n");

rows.forEach(row=>{

const cols =
row.split(",");

if(cols.length >= 2){

addStudent(
cols[0].trim(),
cols[1].trim()
);

}

});

};

reader.readAsText(file);

});

</script>

</body>

</html>
