<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Rased Insights Dashboard
</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:290px;
background:#0f172a;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
line-height:1.5;
color:#facc15;
margin-bottom:20px;
}

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:16px;
border-radius:18px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.menu button:hover{
background:#2563eb;
}

.logout{
background:#dc2626 !important;
}

.main{
flex:1;
padding:30px;
}

.topbar{
margin-bottom:30px;
}

.topbar h1{
font-size:38px;
font-weight:800;
}

.topbar p{
color:#94a3b8;
margin-top:10px;
}

.section{
background:#111827;
padding:25px;
border-radius:26px;
margin-bottom:25px;
overflow:auto;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:15px;
flex-wrap:wrap;
}

.section-header h2{
font-size:24px;
}

.add-btn{
border:none;
background:#2563eb;
color:white;
padding:14px 18px;
border-radius:14px;
cursor:pointer;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:rgba(255,255,255,.05);
padding:16px;
}

td{
padding:16px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.action-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#0f172a;
padding:30px;
border-radius:24px;
width:100%;
max-width:450px;
}

.modal-content h2{
margin-bottom:20px;
text-align:center;
}

.input-group{
margin-bottom:15px;
}

.input-group input,
.input-group select{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
outline:none;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-actions button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
}

.save-btn{
background:#2563eb;
color:white;
}

.cancel-btn{
background:#334155;
color:white;
}

@media (max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:20px;
}

table{
min-width:600px;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Rased<br>
Insights
</div>

<div class="menu">

<button onclick="openModal('teacher')">
إضافة معلم
</button>

<button onclick="openModal('supervisor')">
إضافة مشرف
</button>

<button onclick="openModal('class')">
إضافة فصل
</button>

<button onclick="openModal('student')">
إضافة طالب
</button>

<button onclick="openModal('exam')">
إضافة اختبار
</button>

<button onclick="window.location.href='./reports.html'">
التقارير
</button>

<button
class="logout"
onclick="window.location.href='./index.html'"
>
تسجيل الخروج
</button>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>
لوحة الأدمن
</h1>

<p>
مدارس الفلاح الأهلية - قسم اللغة الإنجليزية
</p>

</div>

<div class="section">

<div class="section-header">

<h2>
الفصول
</h2>

<button
class="add-btn"
onclick="openModal('class')"
>
إضافة فصل
</button>

</div>

<table id="classesTable">

<thead>

<tr>

<th>
اسم الفصل
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="section">

<div class="section-header">

<h2>
الطلاب
</h2>

<button
class="add-btn"
onclick="openModal('student')"
>
إضافة طالب
</button>

</div>

<table id="studentsTable">

<thead>

<tr>

<th>
الاسم
</th>

<th>
الفصل
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modal"
>

<div class="modal-content">

<h2 id="modalTitle">
إضافة
</h2>

<div class="input-group">

<input
type="text"
id="nameInput"
placeholder="الاسم"
/>

</div>

<div
class="input-group"
id="classGroup"
style="display:none"
>

<select id="classSelect">

<option value="">
اختر الفصل
</option>

</select>

</div>

<div
class="input-group"
id="examGroup"
style="display:none"
>

<select id="examSelect">

<option>
الاختبار الدوري الأول
</option>

<option>
الاختبار الدوري الثاني
</option>

<option>
الاختبار الدوري الثالث
</option>

<option>
الاختبار الدوري الرابع
</option>

<option>
الاختبار الدوري الخامس
</option>

<option>
الاختبار الدوري السادس
</option>

<option>
الاختبار الدوري السابع
</option>

<option>
الاختبار الدوري الثامن
</option>

<option>
اختبار الفترة الأولى
</option>

<option>
اختبار الفترة الثانية
</option>

</select>

</div>

<div class="modal-actions">

<button
class="save-btn"
onclick="saveData()"
>
حفظ
</button>

<button
class="cancel-btn"
onclick="closeModal()"
>
إلغاء
</button>

</div>

</div>

</div>

<script>

const modal =
document.getElementById("modal");

const modalTitle =
document.getElementById("modalTitle");

const classGroup =
document.getElementById("classGroup");

const examGroup =
document.getElementById("examGroup");

const classSelect =
document.getElementById("classSelect");

let currentType = "";

let classes = [];

function openModal(type){

currentType = type;

modal.style.display = "flex";

document.getElementById("nameInput").value = "";

classGroup.style.display = "none";

examGroup.style.display = "none";

if(type === "teacher"){

modalTitle.innerText =
"إضافة معلم";

}

else if(type === "supervisor"){

modalTitle.innerText =
"إضافة مشرف";

}

else if(type === "class"){

modalTitle.innerText =
"إضافة فصل";

}

else if(type === "student"){

modalTitle.innerText =
"إضافة طالب";

classGroup.style.display =
"block";

renderClassOptions();

}

else if(type === "exam"){

modalTitle.innerText =
"إضافة اختبار";

examGroup.style.display =
"block";

}

}

function closeModal(){

modal.style.display = "none";

}

function saveData(){

const name =
document.getElementById("nameInput").value;

if(!name){

alert("أدخل الاسم");

return;

}

if(currentType === "class"){

classes.push(name);

renderClasses();

}

else if(currentType === "student"){

const selectedClass =
classSelect.value;

if(!selectedClass){

alert("اختر الفصل");

return;

}

addStudent(name, selectedClass);

}

else{

alert("تم الحفظ");

}

closeModal();

}

function renderClasses(){

const tbody =
document.querySelector("#classesTable tbody");

tbody.innerHTML = "";

classes.forEach((className,index)=>{

tbody.innerHTML += `

<tr>

<td>${className}</td>

<td>

<button
class="action-btn edit"
onclick="editClass(${index})"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteClass(${index})"
>
حذف
</button>

</td>

</tr>

`;

});

}

function renderClassOptions(){

classSelect.innerHTML = `
<option value="">
اختر الفصل
</option>
`;

classes.forEach(className=>{

classSelect.innerHTML += `
<option value="${className}">
${className}
</option>
`;

});

}

function deleteClass(index){

classes.splice(index,1);

renderClasses();

}

function editClass(index){

const newName =
prompt(
"تعديل اسم الفصل",
classes[index]
);

if(newName){

classes[index] = newName;

renderClasses();

}

}

function addStudent(name,className){

const tbody =
document.querySelector("#studentsTable tbody");

tbody.innerHTML += `

<tr>

<td>${name}</td>

<td>${className}</td>

<td>

<button
class="action-btn edit"
onclick="editStudent(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteStudent(this)"
>
حذف
</button>

</td>

</tr>

`;

}

function deleteStudent(button){

button.closest("tr").remove();

}

function editStudent(button){

const row =
button.closest("tr");

const cells =
row.querySelectorAll("td");

const newName =
prompt(
"تعديل اسم الطالب",
cells[0].innerText
);

if(newName){

cells[0].innerText =
newName;

}

}

</script>

</body>

</html>
