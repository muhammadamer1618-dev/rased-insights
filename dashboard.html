<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rased Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo';}

body{
background:#0f172a;
color:white;
display:flex;
min-height:100vh;
}

/* sidebar */
.sidebar{
width:260px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:700;
}

.sidebar button:hover{
background:#2563eb;
}

/* main */
.main{
flex:1;
padding:20px;
}

.section{
background:#111827;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #1e293b;
}

.actions button{
margin:0 3px;
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

.edit{background:#2563eb;color:white;}
.delete{background:#dc2626;color:white;}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#0f172a;
padding:20px;
border-radius:14px;
width:350px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

.save{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
color:white;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<button onclick="openModal('teacher')">إضافة معلم</button>
<button onclick="openModal('supervisor')">إضافة مشرف</button>
<button onclick="openModal('class')">إضافة فصل</button>
<button onclick="openModal('student')">إضافة طالب</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="section">
<h3>المعلمين</h3>
<table>
<thead>
<tr><th>الاسم</th><th>يوزر</th><th>التحكم</th></tr>
</thead>
<tbody id="teachers"></tbody>
</table>
</div>

<div class="section">
<h3>المشرفين</h3>
<table>
<tbody id="supervisors"></tbody>
</table>
</div>

<div class="section">
<h3>الفصول</h3>
<table>
<tbody id="classes"></tbody>
</table>
</div>

<div class="section">
<h3>الطلاب</h3>
<table>
<tbody id="students"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="box">

<input id="name" placeholder="الاسم">
<input id="username" placeholder="يوزر">
<input id="password" placeholder="باسورد">

<select id="classSelect" style="display:none"></select>

<button class="save" onclick="save()">حفظ</button>

</div>

</div>

<script>

let type = "";

function openModal(t){
type = t;
document.getElementById("modal").style.display="flex";

document.getElementById("name").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";

document.getElementById("classSelect").style.display = (t==="student") ? "block":"none";

if(t==="student") loadClasses();
}

function loadClasses(){
let c = JSON.parse(localStorage.getItem("classes"))||[];
let s = document.getElementById("classSelect");
s.innerHTML="";
c.forEach(x=>{
s.innerHTML += `<option>${x.name}</option>`;
});
}

function save(){

let name = document.getElementById("name").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;
let className = document.getElementById("classSelect").value;

if(type==="teacher"){
let d = JSON.parse(localStorage.getItem("teachers"))||[];
d.push({name,username,password});
localStorage.setItem("teachers",JSON.stringify(d));
}

if(type==="supervisor"){
let d = JSON.parse(localStorage.getItem("supervisors"))||[];
d.push({name,username,password});
localStorage.setItem("supervisors",JSON.stringify(d));
}

if(type==="class"){
let d = JSON.parse(localStorage.getItem("classes"))||[];
d.push({name});
localStorage.setItem("classes",JSON.stringify(d));
}

if(type==="student"){
let d = JSON.parse(localStorage.getItem("students"))||[];
d.push({name,className});
localStorage.setItem("students",JSON.stringify(d));
}

close();
renderAll();
}

function close(){
document.getElementById("modal").style.display="none";
}

/* ================= RENDER ================= */

function renderAll(){

let teachers = JSON.parse(localStorage.getItem("teachers"))||[];
document.getElementById("teachers").innerHTML =
teachers.map((t,i)=>`
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>
<button class="delete" onclick="del('teachers',${i})">حذف</button>
</td>
</tr>`).join("");

let supervisors = JSON.parse(localStorage.getItem("supervisors"))||[];
document.getElementById("supervisors").innerHTML =
supervisors.map((t,i)=>`
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>
<button class="delete" onclick="del('supervisors',${i})">حذف</button>
</td>
</tr>`).join("");

let classes = JSON.parse(localStorage.getItem("classes"))||[];
document.getElementById("classes").innerHTML =
classes.map((t,i)=>`
<tr>
<td>${t.name}</td>
<td>
<button class="delete" onclick="del('classes',${i})">حذف</button>
</td>
</tr>`).join("");

let students = JSON.parse(localStorage.getItem("students"))||[];
document.getElementById("students").innerHTML =
students.map((t,i)=>`
<tr>
<td>${t.name}</td>
<td>${t.className}</td>
<td>
<button class="delete" onclick="del('students',${i})">حذف</button>
</td>
</tr>`).join("");

}

/* DELETE */
function del(key,i){
let d = JSON.parse(localStorage.getItem(key))||[];
d.splice(i,1);
localStorage.setItem(key,JSON.stringify(d));
renderAll();
}

/* INIT */
renderAll();

</script>

</body>
</html>
