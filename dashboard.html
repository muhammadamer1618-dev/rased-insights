<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rased Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#0b1220;
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.logo{
font-size:32px;
font-weight:800;
color:#facc15;
margin-bottom:20px;
}

.menu button{
border:none;
padding:14px;
border-radius:14px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:700;
transition:.2s;
}

.menu button:hover{
background:#2563eb;
transform:translateY(-2px);
}

.logout{
background:#dc2626 !important;
}

/* MAIN */
.main{
flex:1;
padding:25px;
}

.section{
background:#111827;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.section h2{
margin-bottom:15px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-box{
background:#0f172a;
padding:25px;
border-radius:20px;
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
gap:12px;
}

.modal-box h2{
text-align:center;
}

input,select{
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
outline:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.save{
flex:1;
background:#2563eb;
border:none;
padding:12px;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
}

.cancel{
flex:1;
background:#334155;
border:none;
padding:12px;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
}

.cancel:hover{
background:#475569;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">Rased</div>

<div class="menu">

<button onclick="openModal('teacher')">إضافة معلم</button>
<button onclick="openModal('supervisor')">إضافة مشرف</button>
<button onclick="openModal('class')">إضافة فصل</button>
<button onclick="openModal('student')">إضافة طالب</button>
<button onclick="openModal('exam')">إضافة اختبار</button>

<button class="logout" onclick="logout()">تسجيل خروج</button>

</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="section">
<h2>الطلاب</h2>
<table id="studentsTable"></table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h2 id="title">إضافة</h2>

<input id="name" placeholder="الاسم">

<input id="username" placeholder="Username">

<input id="password" placeholder="Password">

<select id="classSelect"></select>

<div class="buttons">

<button class="save" onclick="save()">حفظ</button>
<button class="cancel" onclick="closeModal()">إلغاء</button>

</div>

</div>
</div>

<script>

let type = "";

const modal = document.getElementById("modal");

function openModal(t){
type = t;
modal.style.display = "flex";

document.getElementById("name").value = "";
document.getElementById("username").value = "";
document.getElementById("password").value = "";

toggleFields(t);
}

function closeModal(){
modal.style.display = "none";
}

function toggleFields(t){

document.getElementById("username").style.display = "none";
document.getElementById("password").style.display = "none";
document.getElementById("classSelect").style.display = "none";

if(t === "teacher" || t === "supervisor"){
document.getElementById("username").style.display = "block";
document.getElementById("password").style.display = "block";
}

if(t === "student"){
document.getElementById("classSelect").style.display = "block";
loadClasses();
}

}

/* CLASSES */
function loadClasses(){
let classes = JSON.parse(localStorage.getItem("classes")) || [];
let select = document.getElementById("classSelect");

select.innerHTML = "";

classes.forEach(c=>{
select.innerHTML += `<option>${c.name}</option>`;
});
}

/* SAVE */
function save(){

let name = document.getElementById("name").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;
let className = document.getElementById("classSelect").value;

if(type === "student"){
let data = JSON.parse(localStorage.getItem("students")) || [];
data.push({name,className});
localStorage.setItem("students",JSON.stringify(data));
}

if(type === "class"){
let data = JSON.parse(localStorage.getItem("classes")) || [];
data.push({name});
localStorage.setItem("classes",JSON.stringify(data));
}

if(type === "teacher"){
let data = JSON.parse(localStorage.getItem("teachers")) || [];
data.push({name,username,password});
localStorage.setItem("teachers",JSON.stringify(data));
}

if(type === "supervisor"){
let data = JSON.parse(localStorage.getItem("supervisors")) || [];
data.push({name,username,password});
localStorage.setItem("supervisors",JSON.stringify(data));
}

if(type === "exam"){
let data = JSON.parse(localStorage.getItem("exams")) || [];
data.push({name});
localStorage.setItem("exams",JSON.stringify(data));
}

closeModal();
}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="index.html";
}

</script>

</body>
</html>
