<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Rased Insights Dashboard
</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:290px;
background:#0f172a;
padding:25px;
border-left:1px solid rgba(255,255,255,.05);
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
line-height:1.5;
color:#facc15;
margin-bottom:20px;
}

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:16px;
border-radius:18px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.menu button:hover{
background:#2563eb;
transform:translateY(-2px);
}

.logout{
background:#dc2626 !important;
}

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:38px;
font-weight:800;
}

.topbar p{
color:#94a3b8;
font-size:14px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:26px;
border:1px solid rgba(255,255,255,.05);
}

.card h3{
color:#cbd5e1;
margin-bottom:15px;
font-size:17px;
}

.number{
font-size:42px;
font-weight:800;
color:#facc15;
}

.section{
background:#111827;
padding:25px;
border-radius:26px;
border:1px solid rgba(255,255,255,.05);
margin-bottom:25px;
overflow:auto;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:15px;
}

.section-header h2{
font-size:25px;
font-weight:800;
}

.add-btn{
border:none;
background:#2563eb;
color:white;
padding:14px 18px;
border-radius:14px;
cursor:pointer;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:rgba(255,255,255,.05);
padding:16px;
font-size:14px;
}

td{
padding:16px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
color:#cbd5e1;
font-size:14px;
}

.action-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

.import-btn{
background:#0f766e !important;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#0f172a;
padding:30px;
border-radius:24px;
width:100%;
max-width:450px;
}

.modal-content h2{
margin-bottom:20px;
text-align:center;
}

.input-group{
margin-bottom:15px;
}

.input-group input,
.input-group select{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
outline:none;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-actions button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
}

.save-btn{
background:#2563eb;
color:white;
}

.cancel-btn{
background:#334155;
color:white;
}

@media (max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:20px;
}

.topbar h1{
font-size:28px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Rased<br>
Insights
</div>

<div class="menu">

<button onclick="openModal('teacher')">
إضافة معلم
</button>

<button onclick="openModal('supervisor')">
إضافة مشرف
</button>

<button onclick="openModal('class')">
إضافة فصل
</button>

<button onclick="openModal('student')">
إضافة طالب
</button>

<button onclick="openModal('exam')">
إضافة اختبار
</button>

<button
class="import-btn"
id="importBtn"
>
استيراد Excel
</button>

<button onclick="window.location.href='./reports.html'">
التقارير
</button>

<button
class="logout"
onclick="window.location.href='./index.html'"
>
تسجيل الخروج
</button>

<input
type="file"
id="excelFile"
accept=".xlsx,.xls,.csv"
style="display:none"
/>

</div>

</div>

<div class="main">

<div class="topbar">

<div>

<h1>
لوحة الأدمن
</h1>

<p>
مدارس الفلاح الأهلية - قسم اللغة الإنجليزية
</p>

</div>

</div>

<div class="cards">

<div class="card">

<h3>
عدد الطلاب
</h3>

<div class="number">
250
</div>

</div>

<div class="card">

<h3>
عدد المعلمين
</h3>

<div class="number">
12
</div>

</div>

<div class="card">

<h3>
عدد المشرفين
</h3>

<div class="number">
4
</div>

</div>

<div class="card">

<h3>
عدد الفصول
</h3>

<div class="number">
8
</div>

</div>

</div>

<div class="section">

<div class="section-header">

<h2>
آخر الطلاب
</h2>

<button
class="add-btn"
onclick="openModal('student')"
>
إضافة طالب
</button>

</div>

<table id="studentsTable">

<thead>

<tr>

<th>
الاسم
</th>

<th>
الفصل
</th>

<th>
المادة
</th>

<th>
الإجراءات
</th>

</tr>

</thead>

<tbody>

<tr>

<td>
محمد أحمد
</td>

<td>
أول ثانوي A
</td>

<td>
English
</td>

<td>

<button
class="action-btn edit"
onclick="editRow(this)"
>
تعديل
</button>

<button
class="action-btn delete"
onclick="deleteRow(this)"
>
حذف
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modal"
>

<div class="modal-content">

<h2 id="modalTitle">
إضافة
</h2>

<div class="input-group">

<input
type="text"
id="nameInput"
placeholder="الاسم"
/>

</div>

<div class="input-group">

<input
type="text"
id="usernameInput"
placeholder="اسم المستخدم"
/>

</div>

<div class="input-group">

<input
type="password"
id="passwordInput"
placeholder="كلمة المرور"
/>

</div>

<div
class="input-group"
id="classGroup"
>

<select id="classSelect">

<option>
اختر الفصل
</option>

<option>
أول ثانوي A
</option>

<option>
أول ثانوي B
</option>

</select>

</div>

<div
class="input-group"
id="examGroup"
style="display:none"
>

<select id="examSelect">

<option>
الاختبار الدوري الأول
</option>

<option>
الاختبار الدوري الثاني
</option>

<option>
الاختبار الدوري الثالث
</option>

<option>
الاختبار الدوري الرابع
</option>

<option>
الاختبار الدوري الخامس
</option>

<option>
الاختبار الدوري السادس
</option>

<option>
الاختبار الدوري السابع
</option>

<option>
الاختبار الدوري الثامن
</option>

<option>
اختبار الفترة الأولى
</option>

<option>
اختبار الفترة الثانية
</option>

</select>

</div>

<div class="modal-actions">

<button
class="save-btn"
onclick="saveData()"
>
حفظ
</button>

<button
class="cancel-btn"
onclick="closeModal()"
>
إلغاء
</button>

</div>

</div>

</div>

<script>

const modal =
document.getElementById("modal");

const modalTitle =
document.getElementById("modalTitle");

const examGroup =
document.getElementById("examGroup");

const classGroup =
document.getElementById("classGroup");

let currentType = "";

function openModal(type){

currentType = type;

modal.style.display = "flex";

examGroup.style.display = "none";

classGroup.style.display = "block";

if(type === "teacher"){

modalTitle.innerText =
"إضافة معلم";

}

else if(type === "supervisor"){

modalTitle.innerText =
"إضافة مشرف";

}

else if(type === "class"){

modalTitle.innerText =
"إضافة فصل";

}

else if(type === "exam"){

modalTitle.innerText =
"إضافة اختبار";

examGroup.style.display =
"block";

classGroup.style.display =
"none";

}

else{

modalTitle.innerText =
"إضافة طالب";

}

}

function closeModal(){

modal.style.display = "none";

}

function saveData(){

if(currentType === "exam"){

const exam =
document.getElementById("examSelect").value;

alert(
"تم إضافة " + exam
);

}

else{

alert("تم الحفظ بنجاح");

}

closeModal();

}

function deleteRow(button){

button.closest("tr").remove();

}

function editRow(button){

const row =
button.closest("tr");

const cells =
row.querySelectorAll("td");

const newName =
prompt(
"تعديل الاسم",
cells[0].innerText
);

if(newName){

cells[0].innerText =
newName;

}

}

const importBtn =
document.getElementById("importBtn");

const excelFile =
document.getElementById("excelFile");

importBtn.addEventListener("click",()=>{

excelFile.click();

});

excelFile.addEventListener("change",()=>{

alert("تم اختيار ملف Excel");

});

</script>

</body>

</html>
