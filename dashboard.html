<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rased Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#0b1220;
color:white;
}

/* SIDEBAR */
.sidebar{
width:270px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:700;
transition:.2s;
}

.sidebar button:hover{
background:#2563eb;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

h3{margin-bottom:10px;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #1f2937;
}

/* BUTTONS */
.btn{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.edit{background:#f59e0b;color:black;}
.delete{background:#ef4444;color:white;}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#0f172a;
padding:20px;
border-radius:16px;
width:380px;
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
outline:none;
}

.hidden{display:none !important;}

.save{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<button onclick="openModal('teacher')">إضافة معلم</button>
<button onclick="openModal('supervisor')">إضافة مشرف</button>
<button onclick="openModal('class')">إضافة فصل</button>
<button onclick="openModal('student')">إضافة طالب</button>
<button onclick="openModal('exam')">إضافة اختبار</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h3>المعلمين</h3>
<table>
<tbody id="teachers"></tbody>
</table>
</div>

<div class="card">
<h3>المشرفين</h3>
<table>
<tbody id="supervisors"></tbody>
</table>
</div>

<div class="card">
<h3>الفصول</h3>
<table>
<tbody id="classes"></tbody>
</table>
</div>

<div class="card">
<h3>الطلاب</h3>
<table>
<tbody id="students"></tbody>
</table>
</div>

<div class="card">
<h3>الاختبارات</h3>
<table>
<tbody id="exams"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<input id="name" placeholder="الاسم">

<div id="usernameGroup" class="hidden">
<input id="username" placeholder="Username">
</div>

<div id="passwordGroup" class="hidden">
<input id="password" placeholder="Password">
</div>

<div id="classGroup" class="hidden">
<select id="classSelect"></select>
</div>

<div id="multiClassGroup" class="hidden">
<select id="multiClassSelect" multiple></select>
</div>

<button class="save" onclick="save()">حفظ</button>

</div>
</div>

<script>

let type="";

/* ================= OPEN MODAL ================= */

function openModal(t){
type=t;
document.getElementById("modal").style.display="flex";

/* reset */
document.getElementById("name").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";

hideAll();

/* teacher */
if(t==="teacher"){
show("usernameGroup");
show("passwordGroup");
show("multiClassGroup");
loadClassesMulti();
}

/* supervisor */
if(t==="supervisor"){
show("usernameGroup");
show("passwordGroup");
}

/* student */
if(t==="student"){
show("classGroup");
loadClassesSingle();
}
}

/* ================= SHOW/HIDE ================= */

function hideAll(){
document.querySelectorAll(".hidden").forEach(e=>{
e.classList.add("hidden");
});
}

function show(id){
document.getElementById(id).classList.remove("hidden");
}

/* ================= LOAD CLASSES ================= */

function loadClassesMulti(){
let c=JSON.parse(localStorage.getItem("classes"))||[];
let s=document.getElementById("multiClassSelect");
s.innerHTML="";
c.forEach(x=>{
s.innerHTML+=`<option value="${x.name}">${x.name}</option>`;
});
}

function loadClassesSingle(){
let c=JSON.parse(localStorage.getItem("classes"))||[];
let s=document.getElementById("classSelect");
s.innerHTML="";
c.forEach(x=>{
s.innerHTML+=`<option value="${x.name}">${x.name}</option>`;
});
}

/* ================= SAVE ================= */

function save(){

let name=document.getElementById("name").value;
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

/* teacher */
if(type==="teacher"){

let selected=[...document.getElementById("multiClassSelect").selectedOptions]
.map(o=>o.value);

let data=JSON.parse(localStorage.getItem("teachers"))||[];
data.push({name,username,password,classes:selected});
localStorage.setItem("teachers",JSON.stringify(data));
}

/* supervisor */
if(type==="supervisor"){
let data=JSON.parse(localStorage.getItem("supervisors"))||[];
data.push({name,username,password});
localStorage.setItem("supervisors",JSON.stringify(data));
}

/* student */
if(type==="student"){
let className=document.getElementById("classSelect").value;
let data=JSON.parse(localStorage.getItem("students"))||[];
data.push({name,className});
localStorage.setItem("students",JSON.stringify(data));
}

/* class */
if(type==="class"){
let data=JSON.parse(localStorage.getItem("classes"))||[];
data.push({name});
localStorage.setItem("classes",JSON.stringify(data));
}

/* exam */
if(type==="exam"){
let data=JSON.parse(localStorage.getItem("exams"))||[];
data.push({name});
localStorage.setItem("exams",JSON.stringify(data));
}

close();
renderAll();
}

/* ================= CLOSE ================= */

function close(){
document.getElementById("modal").style.display="none";
}

/* ================= RENDER ================= */

function renderAll(){

renderTable("teachers",["name","username","password","classes"]);
renderTable("supervisors",["name","username","password"]);
renderTable("classes",["name"]);
renderTable("students",["name","className"]);
renderTable("exams",["name"]);

}

function renderTable(key,fields){

let data=JSON.parse(localStorage.getItem(key))||[];

document.getElementById(key).innerHTML=
data.map((x,i)=>{

let row="<tr>";

fields.forEach(f=>{
row+=`<td>${Array.isArray(x[f]) ? x[f].join(", ") : (x[f]||"")}</td>`;
});

row+=`<td>
<button class="btn delete" onclick="del('${key}',${i})">حذف</button>
</td></tr>`;

return row;

}).join("");

}

/* ================= DELETE ================= */

function del(key,i){
let d=JSON.parse(localStorage.getItem(key))||[];
d.splice(i,1);
localStorage.setItem(key,JSON.stringify(d));
renderAll();
}

/* INIT */
renderAll();

</script>

</body>
</html>
