<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rased Insights Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:300px;
background:#0f172a;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
color:#facc15;
margin-bottom:20px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:15px;
border-radius:16px;
cursor:pointer;
font-weight:700;
transition:.3s;
}

.menu button:hover{background:#2563eb;}

.logout{background:#dc2626 !important;}

.main{
flex:1;
padding:30px;
}

.section{
background:#111827;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.add-btn{
border:none;
background:#2563eb;
color:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th,td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.action-btn{
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.delete{background:#dc2626;color:white;}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#0f172a;
padding:30px;
border-radius:24px;
width:100%;
max-width:450px;
}

.input-group{
margin-bottom:12px;
}

.input-group input,
.input-group select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
outline:none;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.save-btn{background:#2563eb;color:white;}
.cancel-btn{background:#334155;color:white;}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">Rased<br>Insights</div>

<div class="menu">

<button onclick="openModal('teacher')">إضافة معلم</button>
<button onclick="openModal('supervisor')">إضافة مشرف</button>
<button onclick="openModal('class')">إضافة فصل</button>
<button onclick="openModal('student')">إضافة طالب</button>
<button onclick="openModal('exam')">إضافة اختبار</button>

<button onclick="document.getElementById('importStudents').click()">
استيراد الطلاب
</button>

<input type="file" id="importStudents" accept=".csv" style="display:none">

<button class="logout" onclick="logout()">تسجيل الخروج</button>

</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="section">
<div class="section-header"><h2>المعلمين</h2></div>
<table id="teachersTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header"><h2>المشرفين</h2></div>
<table id="supervisorsTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header"><h2>الفصول</h2></div>
<table id="classesTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header"><h2>الطلاب</h2></div>
<table id="studentsTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header"><h2>الاختبارات</h2></div>
<table id="examsTable"><tbody></tbody></table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h2>إضافة</h2>

<div class="input-group">
<input id="nameInput" placeholder="الاسم">
</div>

<div class="input-group" id="usernameGroup">
<input id="usernameInput" placeholder="Username">
</div>

<div class="input-group" id="passwordGroup">
<input id="passwordInput" placeholder="Password">
</div>

<div class="input-group" id="classGroup">
<select id="classInput"></select>
</div>

<div class="modal-actions">
<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="cancel-btn" onclick="closeModal()">إلغاء</button>
</div>

</div>

</div>

<script>

const modal = document.getElementById("modal");

let currentType = "";

/* OPEN MODAL */
function openModal(type){
currentType = type;
modal.style.display = "flex";

/* reset */
document.getElementById("nameInput").value = "";
document.getElementById("usernameInput").value = "";
document.getElementById("passwordInput").value = "";

/* hide all */
document.getElementById("usernameGroup").style.display = "none";
document.getElementById("passwordGroup").style.display = "none";
document.getElementById("classGroup").style.display = "none";

/* TEACHER / SUPERVISOR */
if(type === "teacher" || type === "supervisor"){
document.getElementById("usernameGroup").style.display = "block";
document.getElementById("passwordGroup").style.display = "block";
}

/* STUDENT */
else if(type === "student"){
document.getElementById("classGroup").style.display = "block";
loadClassOptions();
}

}

/* LOAD CLASSES */
function loadClassOptions(){

let classes = JSON.parse(localStorage.getItem("classes")) || [];
let select = document.getElementById("classInput");

select.innerHTML = "";

if(classes.length === 0){
select.innerHTML = `<option>لا يوجد فصول</option>`;
return;
}

classes.forEach(c=>{
select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
});

}

/* SAVE DATA */
function saveData(){

const name = document.getElementById("nameInput").value;
const username = document.getElementById("usernameInput").value;
const password = document.getElementById("passwordInput").value;
const className = document.getElementById("classInput").value;

if(currentType === "teacher"){

let data = JSON.parse(localStorage.getItem("teachers")) || [];
data.push({name,username,password,classes:[]});
localStorage.setItem("teachers",JSON.stringify(data));

}

else if(currentType === "supervisor"){

let data = JSON.parse(localStorage.getItem("supervisors")) || [];
data.push({name,username,password});
localStorage.setItem("supervisors",JSON.stringify(data));

}

else if(currentType === "student"){

let data = JSON.parse(localStorage.getItem("students")) || [];
data.push({name,className});
localStorage.setItem("students",JSON.stringify(data));

}

else if(currentType === "class"){

let data = JSON.parse(localStorage.getItem("classes")) || [];
data.push({name});
localStorage.setItem("classes",JSON.stringify(data));

}

else if(currentType === "exam"){

let data = JSON.parse(localStorage.getItem("exams")) || [];
data.push({name});
localStorage.setItem("exams",JSON.stringify(data));

}

closeModal();
loadAll();

}

/* LOAD ALL */
window.onload = loadAll;

function loadAll(){
loadTeachers();
loadSupervisors();
loadClasses();
loadStudents();
loadExams();
}

/* TABLES */

function loadTeachers(){
let data = JSON.parse(localStorage.getItem("teachers")) || [];
document.querySelector("#teachersTable tbody").innerHTML =
data.map(t=>`
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>${t.password}</td>
</tr>
`).join("");
}

function loadSupervisors(){
let data = JSON.parse(localStorage.getItem("supervisors")) || [];
document.querySelector("#supervisorsTable tbody").innerHTML =
data.map(t=>`
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>${t.password}</td>
</tr>
`).join("");
}

function loadClasses(){
let data = JSON.parse(localStorage.getItem("classes")) || [];
document.querySelector("#classesTable tbody").innerHTML =
data.map(c=>`<tr><td>${c.name}</td></tr>`).join("");
}

function loadStudents(){
let data = JSON.parse(localStorage.getItem("students")) || [];
document.querySelector("#studentsTable tbody").innerHTML =
data.map(s=>`
<tr>
<td>${s.name}</td>
<td>${s.className}</td>
</tr>
`).join("");
}

function loadExams(){
let data = JSON.parse(localStorage.getItem("exams")) || [];
document.querySelector("#examsTable tbody").innerHTML =
data.map(e=>`<tr><td>${e.name}</td></tr>`).join("");
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
window.location.href="index.html";
}

</script>

</body>
</html>
