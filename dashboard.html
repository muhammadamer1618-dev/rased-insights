<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rased Insights Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:300px;
background:#0f172a;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
color:#facc15;
margin-bottom:20px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
border:none;
background:#1e293b;
color:white;
padding:15px;
border-radius:16px;
cursor:pointer;
font-weight:700;
transition:.3s;
}

.menu button:hover{background:#2563eb;}

.logout{background:#dc2626 !important;}

.main{
flex:1;
padding:30px;
}

.section{
background:#111827;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.add-btn{
border:none;
background:#2563eb;
color:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th,td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.action-btn{
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:2px;
}

.delete{background:#dc2626;color:white;}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#0f172a;
padding:30px;
border-radius:24px;
width:100%;
max-width:450px;
}

.input-group{
margin-bottom:12px;
}

.input-group input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.save-btn{background:#2563eb;color:white;}
.cancel-btn{background:#334155;color:white;}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">Rased<br>Insights</div>

<div class="menu">

<button onclick="openModal('teacher')">إضافة معلم</button>
<button onclick="openModal('supervisor')">إضافة مشرف</button>
<button onclick="openModal('class')">إضافة فصل</button>
<button onclick="openModal('student')">إضافة طالب</button>
<button onclick="openModal('exam')">إضافة اختبار</button>

<button onclick="document.getElementById('importStudents').click()">
استيراد الطلاب
</button>

<input type="file" id="importStudents" accept=".csv" style="display:none">

<button class="logout" onclick="logout()">تسجيل الخروج</button>

</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="section">
<div class="section-header">
<h2>المعلمين</h2>
</div>
<table id="teachersTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header">
<h2>المشرفين</h2>
</div>
<table id="supervisorsTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header">
<h2>الفصول</h2>
</div>
<table id="classesTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header">
<h2>الطلاب</h2>
</div>
<table id="studentsTable"><tbody></tbody></table>
</div>

<div class="section">
<div class="section-header">
<h2>الاختبارات</h2>
</div>
<table id="examsTable"><tbody></tbody></table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h2 id="modalTitle">إضافة</h2>

<div class="input-group">
<input id="nameInput" placeholder="الاسم">
</div>

<div class="input-group">
<input id="usernameInput" placeholder="Username">
</div>

<div class="input-group">
<input id="passwordInput" placeholder="Password">
</div>

<div class="input-group">
<input id="classInput" placeholder="الفصل">
</div>

<div class="modal-actions">
<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="cancel-btn" onclick="closeModal()">إلغاء</button>
</div>

</div>
</div>

<script>

/* ================= AUTH ================= */

const user = JSON.parse(localStorage.getItem("currentUser"));

if (!user || user.role !== "admin") {
window.location.href = "./index.html";
}

/* ================= MODAL ================= */

const modal = document.getElementById("modal");

let currentType = "";

function openModal(type){
currentType = type;
modal.style.display = "flex";
}

function closeModal(){
modal.style.display = "none";
}

/* ================= SAVE ================= */

function saveData(){

const name = document.getElementById("nameInput").value;
const username = document.getElementById("usernameInput").value;
const password = document.getElementById("passwordInput").value;
const className = document.getElementById("classInput").value;

if(currentType === "teacher"){
saveAccount("teachers",{name,username,password});
}

if(currentType === "supervisor"){
saveAccount("supervisors",{name,username,password});
}

if(currentType === "student"){
saveList("students",{name,className});
}

if(currentType === "class"){
saveList("classes",{name});
}

if(currentType === "exam"){
saveList("exams",{name});
}

closeModal();
loadAll();
}

function saveAccount(key,obj){
let data = JSON.parse(localStorage.getItem(key)) || [];
data.push(obj);
localStorage.setItem(key,JSON.stringify(data));
}

function saveList(key,obj){
let data = JSON.parse(localStorage.getItem(key)) || [];
data.push(obj);
localStorage.setItem(key,JSON.stringify(data));
}

/* ================= LOAD ================= */

window.onload = loadAll;

function loadAll(){
loadTeachers();
loadSupervisors();
loadStudents();
loadClasses();
loadExams();
}

/* ================= TEACHERS ================= */

function loadTeachers(){
let data = JSON.parse(localStorage.getItem("teachers")) || [];
const tbody = document.querySelector("#teachersTable tbody");
tbody.innerHTML = "";

data.forEach((t,i)=>{
tbody.innerHTML += `
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>${t.password}</td>
<td><button class="action-btn delete" onclick="deleteItem('teachers',${i})">حذف</button></td>
</tr>`;
});
}

/* ================= SUPERVISORS ================= */

function loadSupervisors(){
let data = JSON.parse(localStorage.getItem("supervisors")) || [];
const tbody = document.querySelector("#supervisorsTable tbody");
tbody.innerHTML = "";

data.forEach((t,i)=>{
tbody.innerHTML += `
<tr>
<td>${t.name}</td>
<td>${t.username}</td>
<td>${t.password}</td>
<td><button class="action-btn delete" onclick="deleteItem('supervisors',${i})">حذف</button></td>
</tr>`;
});
}

/* ================= STUDENTS ================= */

function loadStudents(){
let data = JSON.parse(localStorage.getItem("students")) || [];
const tbody = document.querySelector("#studentsTable tbody");
tbody.innerHTML = "";

data.forEach((s,i)=>{
tbody.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.className || ""}</td>
<td><button class="action-btn delete" onclick="deleteItem('students',${i})">حذف</button></td>
</tr>`;
});
}

/* ================= CLASSES ================= */

function loadClasses(){
let data = JSON.parse(localStorage.getItem("classes")) || [];
const tbody = document.querySelector("#classesTable tbody");
tbody.innerHTML = "";

data.forEach((c,i)=>{
tbody.innerHTML += `
<tr>
<td>${c.name}</td>
<td><button class="action-btn delete" onclick="deleteItem('classes',${i})">حذف</button></td>
</tr>`;
});
}

/* ================= EXAMS ================= */

function loadExams(){
let data = JSON.parse(localStorage.getItem("exams")) || [];
const tbody = document.querySelector("#examsTable tbody");
tbody.innerHTML = "";

data.forEach((e,i)=>{
tbody.innerHTML += `
<tr>
<td>${e.name}</td>
<td><button class="action-btn delete" onclick="deleteItem('exams',${i})">حذف</button></td>
</tr>`;
});
}

/* ================= DELETE ================= */

function deleteItem(key,index){
let data = JSON.parse(localStorage.getItem(key)) || [];
data.splice(index,1);
localStorage.setItem(key,JSON.stringify(data));
loadAll();
}

/* ================= IMPORT STUDENTS ================= */

document.getElementById("importStudents")
.addEventListener("change",(e)=>{

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = (event)=>{

const rows = event.target.result.split("\n");

let data = JSON.parse(localStorage.getItem("students")) || [];

rows.forEach(r=>{
const cols = r.split(",");
if(cols.length >= 2){
data.push({
name: cols[0].trim(),
className: cols[1].trim()
});
}
});

localStorage.setItem("students",JSON.stringify(data));
loadStudents();

};

reader.readAsText(file);

});

/* ================= LOGOUT ================= */

function logout(){
localStorage.removeItem("currentUser");
window.location.href="./index.html";
}

</script>

</body>
</html>
